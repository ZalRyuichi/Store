<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Loading - Ryuichi</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --white:#ffffff;
  --silver:#c0c0c0;
  --t2:#999999;
  --mono:'Inter', monospace;
  --head:'Orbitron', sans-serif;
}

html, body {
  width:100%; height:100%;
  background:#000000;
  color:var(--white);
  font-family:var(--mono);
  overflow:hidden;
}

body {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
}

.loading-wrap {
  width:100%; max-width:480px;
  display:flex; flex-direction:column;
  align-items:center;
}

.video-box {
  width:100%;
  aspect-ratio:16/9;
  background:#000000;
  overflow:hidden;
  border-radius:0;
  display:flex; align-items:center; justify-content:center;
}

.video-box video {
  width:100%; height:100%;
  object-fit:contain;
  background:#000000;
  display:block;
}

.loading-bottom {
  width:100%; max-width:420px;
  margin-top:26px;
}

.bar-track {
  width:100%; height:6px;
  border-radius:6px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  position:relative;
}

.bar-fill {
  height:100%; width:0%;
  border-radius:6px;
  background:linear-gradient(90deg, #6e6e6e, #e8e8e8, #6e6e6e);
  background-size:200% auto;
}

.bar-fill.playing {
  animation: fillBar linear forwards, shimmerMove 1.4s linear infinite;
}

@keyframes fillBar {
  from { width:0%; }
  to   { width:100%; }
}

@keyframes shimmerMove {
  0%   { background-position:0% center; }
  100% { background-position:200% center; }
}

.status-text {
  margin-top:14px;
  text-align:center;
  font-size:12.5px;
  letter-spacing:1px;
  color:var(--t2);
  min-height:18px;
  font-family:var(--mono);
}

.status-text .cursor {
  display:inline-block;
  width:1px; height:12px;
  background:var(--silver);
  margin-left:2px;
  vertical-align:middle;
  animation:blink 0.9s step-end infinite;
}

@keyframes blink { 50% { opacity:0; } }
</style>
</head>
<body>

<div class="loading-wrap">

  <div class="video-box">
    <video id="loading-video" src="../video/loading_ryuichi.mp4" autoplay muted playsinline></video>
  </div>

  <div class="loading-bottom">
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <div class="status-text"><span id="status-text"></span><span class="cursor"></span></div>
  </div>

</div>

<script>
const video   = document.getElementById('loading-video');
const barFill = document.getElementById('bar-fill');
const statusEl= document.getElementById('status-text');

const PHRASE_1 = 'Mengecek Database';
const PHRASE_2 = 'Memuat Komponen';
const TYPE_SPEED   = 70;  // ms per huruf
const ERASE_SPEED  = 35;  // ms per huruf

let navigated = false;

function goNext() {
  if (navigated) return;
  navigated = true;
  location.href = 'splash_ryuichi.html';
}

function typeText(text, speed, cb) {
  statusEl.textContent = '';
  let i = 0;
  const t = setInterval(() => {
    statusEl.textContent += text.charAt(i);
    i++;
    if (i >= text.length) {
      clearInterval(t);
      if (cb) cb();
    }
  }, speed);
}

function eraseText(speed, cb) {
  const t = setInterval(() => {
    const cur = statusEl.textContent;
    if (cur.length === 0) {
      clearInterval(t);
      if (cb) cb();
      return;
    }
    statusEl.textContent = cur.slice(0, -1);
  }, speed);
}

function runTextSequence(duration) {
  const half = (duration * 1000) / 2;

  typeText(PHRASE_1, TYPE_SPEED, () => {
    setTimeout(() => {
      eraseText(ERASE_SPEED, () => {
        typeText(PHRASE_2, TYPE_SPEED);
      });
    }, Math.max(half - (PHRASE_1.length * TYPE_SPEED), 300));
  });
}

video.addEventListener('loadedmetadata', () => {
  const duration = video.duration && isFinite(video.duration) ? video.duration : 6;

  barFill.style.animationDuration = duration + 's';
  barFill.classList.add('playing');

  runTextSequence(duration);
});

video.addEventListener('ended', goNext);

// fallback kalau video gagal load, tetap lanjut setelah beberapa detik
video.addEventListener('error', () => {
  barFill.style.animationDuration = '4s';
  barFill.classList.add('playing');
  runTextSequence(4);
  setTimeout(goNext, 4000);
});
</script>
</body>
</html>
