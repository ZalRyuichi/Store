<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login Kontrol Page</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
@font-face {
  font-family: 'RyuichiTitle';
  src: url('font/title.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:      #0a0a0a;
  --bg2:     #111111;
  --s:       #1a1a1a;
  --c:       #2a2a2a;
  --c2:      #333333;
  --b:       #666666;
  --b2:      #999999;
  --b3:      #bbbbbb;
  --silver:  #c0c0c0;
  --silver2: #d8d8d8;
  --silver3: #a8a8a8;
  --white:   #ffffff;
  --dark:    #0a0a0a;
  --green:   #10b981;
  --red:     #ef4444;
  --amber:   #f59e0b;
  --t:       #ffffff;
  --t2:      #c0c0c0;
  --t3:      #666666;
  --mono:    'Inter', monospace;
  --head:    'Orbitron', sans-serif;
  --title:   'Rajdhani', sans-serif;
  --body:    'Inter', sans-serif;
}

@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes shimmerBg {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(192,192,192,.15), 0 0 40px rgba(192,192,192,.05); }
  50%       { box-shadow: 0 0 20px rgba(192,192,192,.3),  0 0 60px rgba(192,192,192,.12); }
}

html { scroll-behavior:smooth; }
body {
  background: #0a0a0a;
  color: var(--t);
  font-family: var(--body); min-height:100vh;
  font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

/* Animated silver particle background */
body::before {
  content:''; pointer-events:none; position:fixed;
  inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(192,192,192,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,255,255,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(160,160,160,.03) 0%, transparent 70%);
}

body::after {
  content:''; pointer-events:none; position:fixed;
  inset:0; z-index:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,.008) 2px,
    rgba(255,255,255,.008) 4px
  );
}

.wrap {
  position:relative; z-index:1;
  width:100%; max-width:480px;
}

.banner-strip {
  margin:0 0 16px; border-radius:20px;
  overflow:hidden;
  position:relative;
  border: 1px solid rgba(192,192,192,.2);
  box-shadow: 0 4px 20px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
}

.banner-inner {
  position:relative; z-index:1;
  border-radius:20px; overflow:hidden;
  background:linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
  aspect-ratio: 16/9;
  display:flex; align-items:center; justify-content:center;
  min-height:140px;
}

.banner-img {
  width:100%; height:100%; display:block;
  border-radius:20px;
  object-fit:cover;
}

/* Shimmer title text */
.welcome-text {
  text-align:center;
  padding:16px 14px;
  font-family:'RyuichiTitle', var(--head);
  font-size:32px;
  font-weight:700;
  letter-spacing:1px;
}

.wt-white {
  background: linear-gradient(
    90deg,
    #888888 0%,
    #c0c0c0 20%,
    #ffffff 40%,
    #e8e8e8 50%,
    #ffffff 60%,
    #c0c0c0 80%,
    #888888 100%
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
}

.login-section {
  padding:0 0 14px;
}

.login-card {
  background: linear-gradient(145deg, #141414 0%, #0e0e0e 100%);
  border-radius:16px;
  padding:24px;
  box-shadow:
    0 4px 20px rgba(0,0,0,.8),
    inset 0 1px 0 rgba(255,255,255,.06);
  border: 1px solid rgba(192,192,192,.15);
  animation: glowPulse 4s ease-in-out infinite;
}

.field {
  margin-bottom:16px;
}
.field:last-of-type { margin-bottom:20px; }

.field-label {
  display:flex; align-items:center; gap:8px;
  font-size:11px; font-family:var(--mono);
  text-transform:uppercase; letter-spacing:1px;
  color:var(--b2); margin-bottom:6px; font-weight:600;
}
.field-label i { opacity:.6; }

.field-wrap {
  position:relative; display:flex; align-items:center;
}

.field-icon {
  position:absolute; left:12px; top:50%;
  transform:translateY(-50%);
  opacity:.4; flex-shrink:0; color:var(--silver3);
}

.eye-toggle {
  position:absolute; right:12px; top:50%;
  transform:translateY(-50%);
  opacity:.5; cursor:pointer; flex-shrink:0;
  color:var(--silver3); transition:opacity .2s;
}

.eye-toggle:hover { opacity:.9; color:var(--white); }

.field-input {
  width:100%; padding:10px 12px 10px 36px;
  border:1px solid rgba(192,192,192,.15);
  border-radius:10px;
  background: rgba(255,255,255,.04);
  color: var(--white); font-family:var(--body);
  font-size:13px;
  transition: all .2s;
}

.field-input::placeholder { color:var(--t3); }

.field-input:focus {
  outline:none;
  border-color: rgba(255,255,255,.4);
  background: rgba(255,255,255,.07);
  box-shadow: 0 0 0 3px rgba(192,192,192,.08), 0 0 12px rgba(255,255,255,.05);
}

/* Silver shimmer login button */
.login-btn {
  width:100%; padding:11px 14px;
  background: linear-gradient(
    90deg,
    #4a4a4a 0%,
    #888888 20%,
    #c0c0c0 40%,
    #e8e8e8 50%,
    #c0c0c0 60%,
    #888888 80%,
    #4a4a4a 100%
  );
  background-size: 200% auto;
  color: #0a0a0a;
  border:none; border-radius:10px;
  font-family:var(--mono); font-size:11px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer; transition: all .3s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.5), 0 0 20px rgba(192,192,192,.15);
  animation: shimmer 2.5s linear infinite;
}

.login-btn:hover {
  transform:translateY(-2px);
  box-shadow: 0 6px 24px rgba(0,0,0,.6), 0 0 30px rgba(255,255,255,.2);
}

.login-btn:active { transform:translateY(0); }

.login-btn:disabled {
  opacity:.5;
  cursor:not-allowed;
  transform:none;
  animation:none;
  background: #333333;
  color: #666666;
}

.spin {
  display:inline-block; width:12px; height:12px;
  border:2px solid rgba(0,0,0,.3);
  border-radius:50%; border-top-color:#0a0a0a;
  animation:spin .8s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg); } }

/* MODAL NOTIF */
.notif-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.75);
  display:none; align-items:center; justify-content:center;
  z-index:200; backdrop-filter:blur(6px);
  padding:20px;
}

.notif-overlay.show {
  display:flex;
  animation:fadeIn .18s ease;
}

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.notif-box {
  background: linear-gradient(145deg, #141414 0%, #0e0e0e 100%);
  border:1px solid rgba(192,192,192,.2);
  border-radius:20px;
  width:100%; max-width:340px;
  padding:28px 24px 22px;
  text-align:center;
  box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 30px rgba(192,192,192,.08);
  animation:popIn .22s ease;
}

@keyframes popIn {
  from { transform:scale(0.88); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

.notif-icon {
  width:56px; height:56px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; margin:0 auto 14px;
}

.notif-icon.error   { background:rgba(239,68,68,.15);  color:#ef4444; border:1px solid rgba(239,68,68,.3); }
.notif-icon.success { background:rgba(192,192,192,.12); color:#e0e0e0; border:1px solid rgba(192,192,192,.3); }
.notif-icon.warn    { background:rgba(245,158,11,.12);  color:#f59e0b; border:1px solid rgba(245,158,11,.3); }

.notif-title {
  font-size:15px; font-weight:800;
  background: linear-gradient(90deg, #c0c0c0, #ffffff, #c0c0c0);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2.5s linear infinite;
  margin-bottom:6px; font-family:var(--head);
}

.notif-msg {
  font-size:12.5px; color:var(--b2);
  line-height:1.6; margin-bottom:20px;
}

.notif-ok {
  width:100%; padding:12px;
  border:none; border-radius:11px;
  font-size:14px; font-weight:700; font-family:var(--body);
  cursor:pointer; transition:all .2s;
}

.notif-ok.error {
  background:rgba(239,68,68,.12); color:#ef4444;
  border:1px solid rgba(239,68,68,.3);
}
.notif-ok.success {
  background: linear-gradient(90deg, #4a4a4a, #c0c0c0, #ffffff, #c0c0c0, #4a4a4a);
  background-size: 200% auto;
  color: #0a0a0a;
  animation: shimmer 2s linear infinite;
}
.notif-ok.warn {
  background:rgba(245,158,11,.12); color:#f59e0b;
  border:1px solid rgba(245,158,11,.3);
}
.notif-ok:hover { opacity:.85; transform:translateY(-1px); }
</style>
</head>
<body>

<div class="wrap">

  <div class="banner-strip">
    <div class="banner-inner">
      <img class="banner-img" src="../image/login_ryuichi.jpg" alt="Banner"
           onerror="this.style.background='linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%)'">
    </div>
  </div>

  <div class="welcome-text"><span class="wt-white">Ryuichi Application</div>

  <div class="login-section">

    <div class="login-card">

      <div class="field">
        <div class="field-label">
          <i class="fa-solid fa-user"></i>
          Username
        </div>
        <div class="field-wrap">
          <i class="field-icon fa-solid fa-user"></i>
          <input class="field-input" id="username" type="text" placeholder="Masukkan username"
                 autocomplete="username" autocorrect="off" autocapitalize="none">
        </div>
      </div>

      <div class="field">
        <div class="field-label">
          <i class="fa-solid fa-lock"></i>
          Password
        </div>
        <div class="field-wrap">
          <i class="field-icon fa-solid fa-lock"></i>
          <input class="field-input" id="password" type="password" placeholder="Masukkan password"
                 autocomplete="current-password">
          <i class="fa-solid fa-eye eye-toggle" id="eye-toggle" onclick="toggleEye()"></i>
        </div>
      </div>

      <button class="login-btn" id="login-btn" onclick="doLogin()">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        <span id="btn-text">LOGIN</span>
      </button>

    </div>

  </div>

</div>

<div class="notif-overlay" id="notif-overlay">
  <div class="notif-box">
    <div class="notif-icon" id="notif-icon"><i id="notif-icon-i" class="fa-solid fa-circle-xmark"></i></div>
    <div class="notif-title" id="notif-title">Gagal</div>
    <div class="notif-msg" id="notif-msg">Terjadi kesalahan.</div>
    <button class="notif-ok" id="notif-ok" onclick="closeNotif()">OK</button>
  </div>
</div>

<script>
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/ryuichi_api.txt";
let API_BASE = "";

async function loadApiBase() {
  try {
    const cached = localStorage.getItem("app_api_base");
    if (cached) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) { API_BASE = u; localStorage.setItem("app_api_base", u); }
    }
  } catch { const c = localStorage.getItem("app_api_base"); if (c) API_BASE = c.trim(); }
}

function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }

function showNotif(type, title, msg) {
  const iconMap = { 
    error: 'fa-circle-xmark', 
    success: 'fa-circle-check', 
    warn: 'fa-triangle-exclamation' 
  };
  document.getElementById('notif-icon').className = `notif-icon ${type}`;
  document.getElementById('notif-icon-i').className = `fa-solid ${iconMap[type] || 'fa-circle-xmark'}`;
  document.getElementById('notif-title').textContent = title;
  document.getElementById('notif-msg').textContent = msg;
  document.getElementById('notif-ok').className = `notif-ok ${type}`;
  document.getElementById('notif-overlay').classList.add('show');
}

function closeNotif() {
  document.getElementById('notif-overlay').classList.remove('show');
  document.getElementById('username').focus();
}

function toggleEye() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eye-toggle');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fa-solid fa-eye-slash eye-toggle';
  } else {
    inp.type = 'password';
    ico.className = 'fa-solid fa-eye eye-toggle';
  }
}

window.addEventListener('load', async function() {
  const token = localStorage.getItem('bp_token');
  if (token) {
    await loadApiBase();
    try {
      const r = await fetch(apiUrl('/api/auth/me'), { 
        headers: { 'Authorization': 'Bearer ' + token } 
      });
      if (r.ok) {
        location.replace('../kontroler/dashboard_ryuichi.html');
      } else {
        localStorage.removeItem('bp_token');
      }
    } catch {
      localStorage.removeItem('bp_token');
    }
  }
});

document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('btn-text');

  if (!user || !pass) {
    showNotif('warn', 'Data Kosong', 'Mohon Lengkapi Semua Data.');
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<span class="spin"></span> Masuk...';

  await loadApiBase();

  try {
    const deviceId = (typeof AndroidDevice !== 'undefined')
      ? AndroidDevice.getBuildId()
      : 'WEB_' + Math.random().toString(36).substr(2, 9);

    const res = await fetch(apiUrl('/api/auth/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass, deviceId })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Login Gagal');

    localStorage.setItem('bp_token', data.token);
    localStorage.setItem('bp_username', data.username);
    localStorage.setItem('bp_role', data.role);
    localStorage.setItem('bp_displayName', data.displayName);
    localStorage.setItem('bp_expiredAt', data.expiredAt || '');

    showNotif('success', 'Selamat Datang', data.displayName || data.username);
    setTimeout(() => location.replace('../kontroler/loading_ryuichi.html'), 1200);
  } catch (e) {
    showNotif('error', 'Login Gagal', e.message || 'Username Atau Password Salah.');
    
    btn.disabled = false;
    btnText.innerHTML = 'LOGIN';
  }
}
</script>
</body>
</html>
