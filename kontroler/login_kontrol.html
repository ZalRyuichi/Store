<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login Kontrol Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2563EB; --blue-d: #1D4ED8; --blue-l: #EFF6FF;
    --dark: #0F172A; --slate: #64748B; --border: #E2E8F0;
    --white: #FFFFFF; --bg: #F8FAFC; --red: #EF4444;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 20px;
  }

  .page-wrap {
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* BANNER */
  .banner {
    width: 100%; aspect-ratio: 16 / 9;
    border-radius: 18px; overflow: hidden;
    position: relative; background: var(--dark);
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  }
  .banner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .banner-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(15,23,42,0.72) 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 18px 20px;
  }
  .banner-title { font-size: 18px; font-weight: 800; color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,0.5); margin-bottom: 3px; }
  .banner-sub   { font-size: 11px; color: rgba(255,255,255,0.72); font-weight: 500; }
  .banner-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(37,99,235,0.85); backdrop-filter: blur(6px);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.4);
  }

  /* CARD */
  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px 22px 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .card-icon {
    width: 44px; height: 44px; border-radius: 13px;
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff; flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(37,99,235,0.35);
  }
  .card-head-text .card-title { font-size: 15px; font-weight: 800; }
  .card-head-text .card-sub   { font-size: 11px; color: var(--slate); margin-top: 1px; }

  label { font-size: 11px; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 7px; }

  .input-wrap { position: relative; margin-bottom: 14px; }
  .input-wrap i {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--slate); font-size: 13px; pointer-events: none;
  }
  .eye-toggle {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    color: var(--slate); font-size: 13px; cursor: pointer; pointer-events: all;
  }
  input {
    width: 100%; padding: 12px 38px;
    border: 1.5px solid var(--border); border-radius: 11px;
    font-size: 14px; font-family: 'Inter', sans-serif;
    color: var(--dark); background: var(--bg);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); background: #fff; }

  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    color: #fff; border: none; border-radius: 11px;
    font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 14px rgba(37,99,235,0.35);
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .back {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 14px; font-size: 12px; color: var(--slate);
    text-decoration: none; font-weight: 500;
  }
  .back:hover { color: var(--blue); }

  /* MODAL NOTIF */
  .notif-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
    padding: 20px;
  }
  .notif-overlay.show { display: flex; animation: fadeIn 0.18s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .notif-box {
    background: var(--white); border-radius: 20px;
    width: 100%; max-width: 320px;
    padding: 28px 24px 22px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: popIn 0.22s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.88); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .notif-icon {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 14px;
  }
  .notif-icon.error   { background: #FEF2F2; color: var(--red); }
  .notif-icon.success { background: #F0FDF4; color: #16A34A; }
  .notif-icon.warn    { background: #FFFBEB; color: #D97706; }

  .notif-title {
    font-size: 15px; font-weight: 800; color: var(--dark);
    margin-bottom: 6px;
  }
  .notif-msg {
    font-size: 12.5px; color: var(--slate);
    line-height: 1.6; margin-bottom: 20px;
  }
  .notif-ok {
    width: 100%; padding: 12px;
    border: none; border-radius: 11px;
    font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: opacity 0.2s;
  }
  .notif-ok.error   { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }
  .notif-ok.success { background: linear-gradient(135deg, #2563EB, #1D4ED8); color: #fff; }
  .notif-ok.warn    { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; }
  .notif-ok:hover   { opacity: 0.85; }
</style>
</head>
<body>
<div class="page-wrap">

  <!-- BANNER -->
  <div class="banner">
    <img src="../image/kontrol.jpg" alt="Kontrol Device" onerror="this.style.display='none'"/>
    <div class="banner-overlay">
      <div class="banner-title">Kontrol Device</div>
      <div class="banner-sub">Remote Control Perangkat kamu</div>
    </div>
    <div class="banner-badge"><i class="fa-solid fa-shield-halved"></i> Secure Access</div>
  </div>

  <!-- FORM -->
  <div class="card">
    <div class="card-head">
      <div class="card-icon"><i class="fa-solid fa-mobile-screen-button"></i></div>
      <div class="card-head-text">
        <div class="card-title">Masuk ke Kontroler</div>
        <div class="card-sub">Verifikasi Kode Akses</div>
      </div>
    </div>

    <label>Kode Akses</label>
    <div class="input-wrap">
      <i class="fa-solid fa-key"></i>
      <input type="password" id="kode-input" placeholder="Masukkan kode akses..." autocomplete="off"/>
      <i class="fa-solid fa-eye eye-toggle" id="eye-toggle" onclick="toggleEye()"></i>
    </div>

    <button class="btn" id="btn-login" onclick="doLogin()">
      <i class="fa-solid fa-unlock"></i>
      <span id="btn-text">Masuk</span>
    </button>

    <a href="/dashboard.html" class="back"><i class="fa-solid fa-arrow-left"></i> Kembali Ke Dashboard</a>
  </div>

</div>

<!-- MODAL NOTIF -->
<div class="notif-overlay" id="notif-overlay">
  <div class="notif-box">
    <div class="notif-icon" id="notif-icon"><i id="notif-icon-i" class="fa-solid fa-circle-xmark"></i></div>
    <div class="notif-title" id="notif-title">Gagal</div>
    <div class="notif-msg" id="notif-msg">Terjadi kesalahan.</div>
    <button class="notif-ok" id="notif-ok" onclick="closeNotif()">OK</button>
  </div>
</div>

<script>
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";

async function loadApiBase() {
  try {
    const cached = localStorage.getItem("pg_api_base");
    if (cached) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) { API_BASE = u; localStorage.setItem("pg_api_base", u); }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}

function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }

function showNotif(type, title, msg) {
  const iconMap = { error: 'fa-circle-xmark', success: 'fa-circle-check', warn: 'fa-triangle-exclamation' };
  document.getElementById('notif-icon').className   = `notif-icon ${type}`;
  document.getElementById('notif-icon-i').className = `fa-solid ${iconMap[type] || 'fa-circle-xmark'}`;
  document.getElementById('notif-title').textContent = title;
  document.getElementById('notif-msg').textContent   = msg;
  document.getElementById('notif-ok').className      = `notif-ok ${type}`;
  document.getElementById('notif-overlay').classList.add('show');
}

function closeNotif() {
  document.getElementById('notif-overlay').classList.remove('show');
  document.getElementById('kode-input').focus();
}

function toggleEye() {
  const inp = document.getElementById('kode-input');
  const ico = document.getElementById('eye-toggle');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fa-solid fa-eye-slash eye-toggle';
  } else {
    inp.type = 'password';
    ico.className = 'fa-solid fa-eye eye-toggle';
  }
}

async function doLogin() {
  const val     = document.getElementById('kode-input').value.trim();
  const btn     = document.getElementById('btn-login');
  const btnText = document.getElementById('btn-text');

  if (!val) {
    showNotif('warn', 'Kode Kosong', 'Kode akses tidak boleh kosong.');
    return;
  }

  btn.disabled = true;
  btnText.textContent = 'Memverifikasi...';
  btn.querySelector('i').className = 'fa-solid fa-spinner fa-spin';

  await loadApiBase();

  try {
    const res  = await fetch(apiUrl('/api/kontrol/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kode: val }),
    });
    const data = await res.json();

    if (data.ok) {
      sessionStorage.setItem('kontroler_auth', '1');
      sessionStorage.setItem('kontroler_token', data.token);
      showNotif('success', 'Berhasil Masuk', 'Kode akses valid. Mengalihkan...');
      setTimeout(() => window.location.href = '/kontroler/kontrol.html', 1200);
    } else {
      document.getElementById('kode-input').value = '';
      showNotif('error', 'Kode Salah', data.message || 'Kode akses salah, coba lagi.');
      btn.disabled = false;
      btnText.textContent = 'Masuk';
      btn.querySelector('i').className = 'fa-solid fa-unlock';
    }
  } catch (err) {
    showNotif('error', 'Koneksi Gagal', 'Tidak bisa terhubung ke server. Coba lagi.');
    btn.disabled = false;
    btnText.textContent = 'Masuk';
    btn.querySelector('i').className = 'fa-solid fa-unlock';
  }
}

document.getElementById('kode-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
