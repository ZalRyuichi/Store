<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Device Ryuichi</title>
<style>
@font-face { font-family:'TitleFont'; src:url('../font/1.ttf') format('truetype'); }
@font-face { font-family:'XYZTitle';  src:url('../font/title.ttf') format('truetype'); }
@font-face { font-family:'BodyFont';  src:url('../font/2.ttf') format('truetype'); }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:#0a0a0a; --bg2:#111111;
  --c:#2a2a2a; --c2:#333333;
  --b:#666666; --b2:#999999;
  --s:#1e1e1e;
  --silver:#c0c0c0; --silver2:#d8d8d8; --silver3:#a8a8a8;
  --green:#34d399; --red:#f87171; --amber:#fbbf24;
  --t:#ffffff; --t2:#c0c0c0; --t3:#666666;
  --r:14px; --mono:'Courier New',monospace;
  --title:'TitleFont','BodyFont',sans-serif;
  --body:'BodyFont',sans-serif;
}

body { background:var(--bg); color:var(--t); font-family:var(--body); min-height:100vh; overflow-x:hidden; }

/* ── HEADER ── */
.app-header {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,10,.96); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(192,192,192,.08);
  height:52px; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
}
.header-title { font-family:var(--title); font-size:15px; letter-spacing:3px; color:var(--silver2); }
.header-count {
  font-family:var(--mono); font-size:10px; letter-spacing:1px;
  color:var(--t3); display:flex; align-items:center; gap:8px;
}
.count-pill {
  display:flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px;
  border:1px solid rgba(52,211,153,.2); background:rgba(52,211,153,.06);
  color:var(--green);
}
.count-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── TABS ── */
.device-tabs { display:flex; gap:0; padding:0 14px; margin-top:4px; border-bottom:1px solid rgba(192,192,192,.07); }
.dtab {
  flex:1; padding:10px 0; font-family:var(--mono); font-size:9px; letter-spacing:2px;
  text-transform:uppercase; text-align:center; cursor:pointer;
  color:var(--t3); border-bottom:2px solid transparent; transition:all .2s;
}
.dtab.active { color:var(--silver2); border-color:var(--silver2); }
.dtab-panel { display:none; }
.dtab-panel.active { display:block; padding-bottom:80px; }

/* ── DEVICE CARD ── */
.device-select-card {
  background:var(--c); border:1px solid var(--b);
  border-radius:var(--r); overflow:hidden;
  animation:up .3s ease both;
  transition:border-color .2s, background .2s, box-shadow .2s;
  margin:10px 14px 0; position:relative; cursor:pointer;
}
.device-select-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(192,192,192,.15),transparent); opacity:0; transition:opacity .2s; }
.device-select-card:hover { border-color:rgba(192,192,192,.25); background:var(--c2); box-shadow:0 8px 32px rgba(0,0,0,.4), 0 0 20px rgba(192,192,192,.04); }
.device-select-card:hover::before { opacity:1; }
.device-select-card.offline-card { opacity:.75; }

@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.dcard-strip { height:3px; width:100%; background:linear-gradient(90deg,rgba(192,192,192,.6),rgba(192,192,192,.3),transparent); }
.dcard-strip.offline { background:linear-gradient(90deg,rgba(248,113,113,.5),rgba(251,191,36,.2),transparent); }

.dcard-head { padding:13px 14px 10px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.dcard-left { display:flex; align-items:center; gap:12px; min-width:0; }

.dcard-avatar-wrap { position:relative; flex-shrink:0; }
.dcard-avatar { width:42px; height:42px; border-radius:12px; background:rgba(192,192,192,.07); border:1px solid rgba(192,192,192,.15); display:flex; align-items:center; justify-content:center; color:rgba(192,192,192,.5); }
.dcard-avatar.offline-av { background:rgba(248,113,113,.05); border-color:rgba(248,113,113,.12); color:rgba(248,113,113,.3); }
.dcard-status-ring { position:absolute; bottom:-3px; right:-3px; width:13px; height:13px; border-radius:50%; border:2px solid var(--c); background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
.dcard-status-ring.offline { background:var(--red); box-shadow:0 0 6px rgba(248,113,113,.5); animation:none; }

.dcard-text { min-width:0; }
.dcard-name { font-family:var(--body); font-size:13px; font-weight:700; color:var(--t); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:170px; }
.dcard-id { font-family:var(--mono); font-size:8px; color:var(--t2); margin-top:2px; letter-spacing:1px; }

.badge { font-family:var(--mono); font-size:7px; letter-spacing:1.5px; padding:3px 8px; border-radius:5px; text-transform:uppercase; flex-shrink:0; font-weight:700; }
.badge-on  { background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.2); color:var(--green); }
.badge-off { background:rgba(248,113,113,.06); border:1px solid rgba(248,113,113,.15); color:var(--red); }

.dcard-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; margin:0 14px 12px; background:var(--b); border-radius:10px; overflow:hidden; border:1px solid var(--b); }
.dinfo-cell { background:var(--s); padding:8px 11px; display:flex; align-items:center; gap:8px; }
.dinfo-cell.full { grid-column:1/-1; }
.dinfo-icon { width:26px; height:26px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.dinfo-icon.bat   { background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.15); color:var(--green); }
.dinfo-icon.bat.low { background:rgba(248,113,113,.08); border-color:rgba(248,113,113,.15); color:var(--red); }
.dinfo-icon.bat.mid { background:rgba(251,191,36,.08); border-color:rgba(251,191,36,.15); color:var(--amber); }
.dinfo-icon.bat.charging { background:rgba(251,191,36,.1); border-color:rgba(251,191,36,.2); color:var(--amber); }
.dinfo-icon.sdk { background:rgba(192,192,192,.08); border:1px solid rgba(192,192,192,.15); color:var(--silver2); }
.dinfo-icon.sim { background:rgba(140,140,140,.08); border:1px solid rgba(140,140,140,.15); color:#a78bfa; }
.dinfo-icon.time { background:rgba(192,192,192,.06); border:1px solid rgba(192,192,192,.12); color:var(--silver); }
.dinfo-label { font-family:var(--mono); font-size:7px; color:var(--t2); letter-spacing:1.5px; text-transform:uppercase; }
.dinfo-val   { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--silver2); margin-top:1px; }
.dinfo-val.green { color:var(--green); }
.dinfo-val.amber { color:var(--amber); }
.dinfo-val.red   { color:var(--red); }

.bat-bar-wrap { flex:1; }
.bat-bar-track { height:3px; background:rgba(255,255,255,.06); border-radius:2px; margin-top:4px; overflow:hidden; }
.bat-bar-fill { height:100%; border-radius:2px; transition:width .4s; }
.bat-bar-fill.green { background:var(--green); box-shadow:0 0 6px rgba(52,211,153,.5); }
.bat-bar-fill.amber { background:var(--amber); box-shadow:0 0 6px rgba(251,191,36,.4); }
.bat-bar-fill.red   { background:var(--red); box-shadow:0 0 6px rgba(248,113,113,.5); }
.bat-bar-fill.charging { background:linear-gradient(90deg,var(--amber),#fde68a); }

.select-hint { display:flex; align-items:center; justify-content:center; gap:6px; padding:8px 14px; border-top:1px solid var(--b); font-family:var(--mono); font-size:8px; color:var(--t3); letter-spacing:.5px; }

/* ── EMPTY ── */
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:60px 20px; color:var(--t3); }
.empty-icon { width:48px; height:48px; border-radius:14px; background:rgba(192,192,192,.05); border:1px solid rgba(192,192,192,.1); display:flex; align-items:center; justify-content:center; color:rgba(192,192,192,.3); }
.empty-title { font-family:var(--mono); font-size:13px; letter-spacing:2px; color:var(--t2); }
.empty-sub { font-family:var(--mono); font-size:10px; color:var(--t3); letter-spacing:1px; }

/* ── BOTTOM NAV ── */
.bnav { position:fixed; bottom:0; left:0; right:0; z-index:200; background:rgba(10,10,10,.96); backdrop-filter:blur(16px); border-top:1px solid rgba(192,192,192,.08); height:56px; display:flex; align-items:center; justify-content:space-around; }
.bnav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 20px; border-radius:10px; color:var(--t3); font-family:var(--mono); font-size:7.5px; letter-spacing:1.5px; text-transform:uppercase; text-decoration:none; transition:color .2s; }
.bnav-item.active { color:var(--silver2); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-title">DEVICE LIST</div>
  <div class="header-count">
    <div class="count-pill">
      <div class="count-dot"></div>
      <span id="count-online">0</span> ONLINE
    </div>
    <span id="count-offline" style="color:var(--t3)">0 OFFLINE</span>
  </div>
</div>

<div class="device-tabs" style="margin-top:0">
  <div class="dtab active" id="tab-online" onclick="switchTab('online')">
    ONLINE (<span id="tab-online-count">0</span>)
  </div>
  <div class="dtab" id="tab-offline" onclick="switchTab('offline')">
    OFFLINE (<span id="tab-offline-count">0</span>)
  </div>
</div>

<div class="dtab-panel active" id="panel-online">
  <div id="device-list">
    <div class="empty" id="empty-online">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>
      </div>
      <div class="empty-title">NO DEVICES</div>
      <div class="empty-sub">WAITING FOR CONNECTION</div>
    </div>
  </div>
</div>

<div class="dtab-panel" id="panel-offline">
  <div id="device-list-offline">
    <div class="empty" id="empty-offline">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="5" y="2" width="14" height="20" rx="3"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>
      </div>
      <div class="empty-title">NO OFFLINE DATA</div>
      <div class="empty-sub">NO SAVED RECORDS</div>
    </div>
  </div>
</div>

<nav class="bnav">
  <a class="bnav-item" href="../kontroler/dashboard_ryuichi.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    HOME
  </a>
  <a class="bnav-item active" href="../kontroler/device_ryuichi.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="3"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="2.5"/></svg>
    DEVICES
  </a>
  <a class="bnav-item" href="../kontroler/tools.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    TOOLS
  </a>
</nav>

<script>
const API_TXT = 'https://raw.githubusercontent.com/ZalRyuichi/Store/main/ryuichi_api.txt'
let BASE = ''
const TOKEN = localStorage.getItem('bp_token') || ''

async function init() {
  try {
    const cached = localStorage.getItem('app_api_base')
    if (cached) BASE = cached.trim()
    const r = await fetch(API_TXT + '?t=' + Date.now())
    if (r.ok) {
      const u = (await r.text()).trim()
      if (u && u.startsWith('http')) { BASE = u; localStorage.setItem('app_api_base', u) }
    }
  } catch {}
  loadOnline()
  loadOffline()
}

function apiUrl(p) { return BASE ? BASE + p : p }

async function loadOnline() {
  try {
    const r = await fetch(apiUrl('/api/devices'), { headers: { Authorization: 'Bearer ' + TOKEN } })
    const devices = await r.json()
    renderOnline(Array.isArray(devices) ? devices : [])
  } catch {}
}

async function loadOffline() {
  try {
    const r = await fetch(apiUrl('/api/devices/offline'), { headers: { Authorization: 'Bearer ' + TOKEN } })
    const devices = await r.json()
    renderOffline(Array.isArray(devices) ? devices : [])
  } catch {}
}

function renderOnline(devices) {
  const list = document.getElementById('device-list')
  const empty = document.getElementById('empty-online')
  document.getElementById('count-online').textContent = devices.length
  document.getElementById('tab-online-count').textContent = devices.length
  if (devices.length === 0) { list.innerHTML = ''; list.appendChild(empty); return }
  if (list.contains(empty)) empty.remove()
  const existing = {}
  list.querySelectorAll('.device-select-card').forEach(el => existing[el.dataset.id] = el)
  Object.keys(existing).forEach(id => { if (!devices.find(d => d.id === id)) existing[id].remove() })
  devices.forEach(d => {
    if (!existing[d.id]) list.appendChild(makeCard(d, true))
  })
}

function renderOffline(devices) {
  const list = document.getElementById('device-list-offline')
  const empty = document.getElementById('empty-offline')
  document.getElementById('count-offline').textContent = devices.length + ' OFFLINE'
  document.getElementById('tab-offline-count').textContent = devices.length
  if (devices.length === 0) { list.innerHTML = ''; list.appendChild(empty); return }
  if (list.contains(empty)) empty.remove()
  list.innerHTML = ''
  devices.forEach(d => list.appendChild(makeCard(d, false)))
}

function makeCard(d, isOnline) {
  const info = d.info || {}
  const bat = info.battery != null ? info.battery : null
  const charging = !!info.charging
  const sdk = info.sdk || null
  const sim = info.sim || null
  const lastSeen = d.lastSeen ? new Date(d.lastSeen).toLocaleString('id-ID') : '—'

  let batClass = 'green'
  if (charging) batClass = 'charging'
  else if (bat != null && bat <= 20) batClass = 'red'
  else if (bat != null && bat <= 40) batClass = 'amber'

  const el = document.createElement('div')
  el.className = 'device-select-card' + (!isOnline ? ' offline-card' : '')
  el.dataset.id = d.id
  el.innerHTML = `
    <div class="dcard-strip${!isOnline ? ' offline' : ''}"></div>
    <div class="dcard-head">
      <div class="dcard-left">
        <div class="dcard-avatar-wrap">
          <div class="dcard-avatar${!isOnline ? ' offline-av' : ''}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="3"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="2.5"/></svg>
          </div>
          <div class="dcard-status-ring${!isOnline ? ' offline' : ''}"></div>
        </div>
        <div class="dcard-text">
          <div class="dcard-name">${esc(d.name || 'Unknown Device')}</div>
          <div class="dcard-id">${esc(d.id)}</div>
        </div>
      </div>
      <span class="badge ${isOnline ? 'badge-on' : 'badge-off'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
    </div>
    <div class="dcard-info-grid">
      ${bat != null ? `
      <div class="dinfo-cell full">
        <div class="dinfo-icon bat ${batClass === 'charging' ? 'charging' : batClass === 'red' ? 'low' : batClass === 'amber' ? 'mid' : ''}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/>${charging ? '<path d="M7 12l3 3 4-6" stroke-width="2.2"/>' : ''}</svg>
        </div>
        <div class="bat-bar-wrap">
          <div class="dinfo-label">Battery${charging ? ' · Charging' : ''}</div>
          <div class="dinfo-val ${batClass === 'charging' ? 'amber' : batClass}">${bat}%</div>
          <div class="bat-bar-track"><div class="bat-bar-fill ${batClass}" style="width:${bat}%"></div></div>
        </div>
      </div>` : ''}
      ${sdk ? `
      <div class="dinfo-cell">
        <div class="dinfo-icon sdk"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
        <div><div class="dinfo-label">Android SDK</div><div class="dinfo-val">API ${sdk}</div></div>
      </div>` : ''}
      ${sim ? `
      <div class="dinfo-cell">
        <div class="dinfo-icon sim"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M8 7h8M8 11h5"/></svg></div>
        <div><div class="dinfo-label">SIM</div><div class="dinfo-val">${esc(sim)}</div></div>
      </div>` : ''}
      <div class="dinfo-cell${!sdk && !sim ? '' : ' full'}">
        <div class="dinfo-icon time"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div><div class="dinfo-label">${isOnline ? 'Connected' : 'Last Seen'}</div><div class="dinfo-val" style="font-size:9px">${lastSeen}</div></div>
      </div>
    </div>
    <div class="select-hint">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      TAP TO CONTROL
    </div>
  `
  if (isOnline) el.onclick = () => goControl(d.id)
  return el
}

function goControl(id) {
  localStorage.setItem('selected_device_id', id)
  location.href = '../kontroler/dashboard_ryuichi.html?device=' + encodeURIComponent(id)
}

function switchTab(tab) {
  document.getElementById('tab-online').classList.toggle('active', tab === 'online')
  document.getElementById('tab-offline').classList.toggle('active', tab === 'offline')
  document.getElementById('panel-online').classList.toggle('active', tab === 'online')
  document.getElementById('panel-offline').classList.toggle('active', tab === 'offline')
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

init()
setInterval(() => { loadOnline(); loadOffline() }, 10000)
</script>
</body>
</html>
