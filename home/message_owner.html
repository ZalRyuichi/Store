<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ryuichi Chat — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0c12;
    --bg-panel:#12151d;
    --bg-panel-hover:#191d29;
    --bg-chat:#0d0f16;
    --bg-chat-pattern: rgba(37,99,235,0.05);
    --bubble-sent-1:#2563eb;
    --bubble-sent-2:#1e40af;
    --bubble-recv:#1b1f2a;
    --text-primary:#edeef3;
    --text-secondary:#8891a6;
    --text-faint:#565d70;
    --accent-coral:#ff6b5e;
    --online-green:#34d399;
    --divider:#1d212c;
    --radius-lg:22px;
    --radius-sm:6px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; height:100dvh;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg-void);
    color:var(--text-primary);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    overflow:hidden;
  }

  .app{
    width:100%;
    max-width:1180px;
    height:100vh;
    height:100dvh;
    max-height:800px;
    display:flex;
    background:var(--bg-panel);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .logo{ display:flex; align-items:center; gap:10px; min-width:0; }
  .logo-mark{ display:flex; align-items:flex-end; gap:3px; height:22px; flex-shrink:0; }
  .logo-mark span{
    width:4px; border-radius:3px;
    background:linear-gradient(180deg, var(--bubble-sent-1), var(--bubble-sent-2));
    animation: wave 1.4s ease-in-out infinite;
  }
  .logo-mark span:nth-child(1){height:8px; animation-delay:0s;}
  .logo-mark span:nth-child(2){height:18px; animation-delay:.15s;}
  .logo-mark span:nth-child(3){height:12px; animation-delay:.3s;}
  .logo-mark span:nth-child(4){height:20px; animation-delay:.45s;}
  .logo-mark span:nth-child(5){height:7px; animation-delay:.6s;}
  @keyframes wave{ 0%,100%{transform:scaleY(0.55);} 50%{transform:scaleY(1);} }
  .logo-text{
    font-family:'Sora',sans-serif; font-weight:700; font-size:18px;
    letter-spacing:0.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .sidebar{
    width:360px; min-width:320px;
    background:var(--bg-panel);
    display:flex; flex-direction:column;
    border-right:1px solid var(--divider);
  }
  .sidebar-top{
    padding:20px 20px 14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .menu-wrap{ position:relative; }
  .dropdown-menu{
    position:absolute; top:46px; right:0; min-width:190px;
    background:var(--bg-panel-hover); border:1px solid var(--divider); border-radius:14px;
    padding:6px; display:none; flex-direction:column; gap:2px; z-index:50;
    box-shadow:0 12px 30px rgba(0,0,0,0.45);
  }
  .dropdown-menu.show{ display:flex; }
  .dropdown-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
    background:none; border:none; color:var(--text-primary); font-family:'Inter',sans-serif;
    font-size:13.5px; cursor:pointer; text-align:left; width:100%;
  }
  .dropdown-item:hover{ background:var(--bg-panel); }
  .dropdown-item.danger{ color:var(--accent-coral); }
  .dropdown-item svg{ flex-shrink:0; opacity:.85; }

  .search-wrap{ padding:0 20px 16px; }
  .search-box{
    display:flex; align-items:center; gap:10px;
    background:#191d29; border:1px solid var(--divider); border-radius:12px;
    padding:10px 14px;
  }
  .search-box svg{flex-shrink:0; opacity:0.5;}
  .search-box input{
    background:none; border:none; outline:none; color:var(--text-primary);
    font-family:'Inter',sans-serif; font-size:14px; width:100%;
  }
  .search-box input::placeholder{color:var(--text-faint);}

  .chat-list{ flex:1; overflow-y:auto; padding:4px 8px 12px; }
  .chat-list::-webkit-scrollbar{width:6px;}
  .chat-list::-webkit-scrollbar-thumb{background:#232838; border-radius:10px;}

  .empty-tab{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; height:100%; padding:40px 30px; color:var(--text-faint); gap:10px;
  }
  .empty-tab svg{opacity:0.35; margin-bottom:6px;}
  .empty-tab strong{color:var(--text-secondary); font-family:'Sora',sans-serif; font-size:14px; font-weight:600;}
  .empty-tab p{font-size:12.5px; line-height:1.5;}
  .loading-tab{ text-align:center; padding:30px; color:var(--text-faint); font-size:13px; }
  .spinner{
    width:22px; height:22px; border-radius:50%;
    border:2.5px solid var(--divider); border-top-color:var(--bubble-sent-1);
    animation:spin .7s linear infinite; margin:0 auto 10px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .chat-item{
    display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:14px;
    cursor:pointer; transition:background .15s ease; position:relative;
  }
  .chat-item:hover{background:var(--bg-panel-hover);}
  .chat-item.active{background:#1b1f2e;}
  .chat-item.active::before{
    content:""; position:absolute; left:0; top:14px; bottom:14px; width:3px; border-radius:4px;
    background:linear-gradient(180deg,var(--bubble-sent-1),var(--bubble-sent-2));
  }

  .avatar{
    width:48px;height:48px;border-radius:50%; flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif; font-weight:700; font-size:15px; color:#fff;
    position:relative; background-size:cover; background-position:center;
  }
  .avatar.online::after{
    content:""; position:absolute; right:0px; bottom:0px; width:11px;height:11px;
    background:var(--online-green); border:2.5px solid var(--bg-panel); border-radius:50%;
  }

  .chat-item-body{ flex:1; min-width:0; }
  .chat-item-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px; }
  .chat-item-name{
    font-family:'Sora',sans-serif; font-weight:600; font-size:14.5px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .chat-item-time{ font-size:11.5px; color:var(--text-faint); flex-shrink:0; margin-left:8px; }
  .chat-item-bottom{ display:flex; justify-content:space-between; align-items:center; }
  .chat-item-msg{
    font-size:13px; color:var(--text-secondary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:210px;
  }
  .chat-item.unread .chat-item-msg{ color:var(--text-primary); font-weight:600; }
  .badge{
    background:var(--accent-coral); color:#1a0a08; font-size:11px; font-weight:700;
    min-width:19px; height:19px; border-radius:10px;
    display:flex;align-items:center;justify-content:center; padding:0 5px; flex-shrink:0;
  }

  .nav-tabs{
    display:flex; flex-shrink:0; padding:6px 8px;
    border-top:1px solid var(--divider); background:var(--bg-panel);
  }
  .nav-tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:5px;
    background:none; border:none; color:var(--text-faint);
    padding:9px 4px 8px; cursor:pointer; position:relative;
    font-family:'Inter',sans-serif; border-radius:12px;
    transition:color .15s ease, background .15s ease;
  }
  .nav-tab span{ font-size:11px; font-weight:600; letter-spacing:0.1px; }
  .nav-tab:hover{color:var(--text-secondary); background:var(--bg-panel-hover);}
  .nav-tab.active{color:var(--bubble-sent-1);}
  .nav-tab.active::before{
    content:""; position:absolute; left:22px; right:22px; top:-6px; height:2.5px;
    border-radius:0 0 3px 3px;
    background:linear-gradient(90deg,var(--bubble-sent-1),var(--bubble-sent-2));
  }
  .nav-tab .tab-badge{
    position:absolute; top:6px; right:calc(50% - 20px);
    background:var(--accent-coral); color:#1a0a08; font-size:9.5px; font-weight:700;
    min-width:16px; height:16px; border-radius:9px;
    display:flex;align-items:center;justify-content:center; padding:0 4px;
  }

  .chat-area{
    flex:1; display:flex; flex-direction:column; background:var(--bg-chat);
    background-image:
      radial-gradient(circle at 15% 10%, var(--bg-chat-pattern) 0, transparent 45%),
      radial-gradient(circle at 85% 90%, var(--bg-chat-pattern) 0, transparent 45%);
    min-width:0;
  }
  .chat-header{
    display:flex; align-items:center; justify-content:space-between; padding:14px 22px;
    border-bottom:1px solid var(--divider); background:rgba(18,21,29,0.6); backdrop-filter:blur(6px);
  }
  .chat-header-left{ display:flex; align-items:center; gap:12px; min-width:0; }
  .back-btn{ display:none; background:none;border:none;color:var(--text-secondary); cursor:pointer; padding:4px; flex-shrink:0; }
  .chat-header-name{ font-family:'Sora',sans-serif; font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-header-status{ font-size:12.5px; color:var(--text-secondary); }
  .icon-btn{
    width:38px;height:38px; border-radius:50%; background:transparent; border:none;
    display:flex;align-items:center;justify-content:center; color:var(--text-secondary);
    cursor:pointer; transition:background .15s;
  }
  .icon-btn:hover{background:var(--bg-panel-hover); color:var(--text-primary);}

  .messages{ flex:1; overflow-y:auto; padding:22px 26px; display:flex; flex-direction:column; gap:3px; }
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:#1c2130; border-radius:10px;}

  .date-divider{
    align-self:center; background:#171b26; color:var(--text-secondary); font-size:11.5px;
    font-weight:600; padding:5px 14px; border-radius:20px; margin:14px 0 18px;
  }

  .msg-row{ display:flex; max-width:66%; margin-bottom:4px; flex-direction:column; }
  .msg-row.in{align-self:flex-start;}
  .msg-row.out{align-self:flex-end;}
  .msg-sender{
    font-size:11.5px; font-weight:700; color:var(--bubble-sent-1); margin:0 0 3px 4px;
  }

  .bubble{ padding:9px 13px 8px; font-size:14.2px; line-height:1.45; position:relative; max-width:100%; width:fit-content; }
  .msg-row.in .bubble{
    background:var(--bubble-recv); color:var(--text-primary);
    border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius-sm);
  }
  .msg-row.out .bubble{
    background:linear-gradient(135deg, var(--bubble-sent-1), var(--bubble-sent-2)); color:#fff;
    border-radius:var(--radius-lg) var(--radius-lg) var(--radius-sm) var(--radius-lg);
    align-self:flex-end;
  }
  .bubble-text{ white-space:pre-wrap; word-wrap:break-word; overflow-wrap:anywhere; }
  .bubble-img{ max-width:230px; border-radius:12px; display:block; cursor:zoom-in; margin-bottom:4px; }
  .bubble-meta{ display:flex; align-items:center; gap:4px; justify-content:flex-end; margin-top:3px; font-size:10.5px; }
  .msg-row.in .bubble-meta{color:var(--text-faint);}
  .msg-row.out .bubble-meta{color:rgba(255,255,255,0.75);}

  .chat-empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-faint); gap:10px; padding:20px; text-align:center;
  }
  .chat-empty-state svg{opacity:.35;}
  .chat-empty-state strong{ font-family:'Sora',sans-serif; font-size:15px; color:var(--text-secondary); font-weight:700; }
  .chat-empty-state p{ font-size:12.5px; max-width:280px; }
  .loading-msgs{ margin:auto; text-align:center; color:var(--text-faint); font-size:13px; }

  .composer{
    display:flex; align-items:center; gap:10px; padding:14px 22px;
    border-top:1px solid var(--divider); background:rgba(18,21,29,0.5);
  }
  .composer-input{
    flex:1; background:#191d29; border:1px solid var(--divider); border-radius:22px;
    padding:11px 18px; color:var(--text-primary); font-family:'Inter',sans-serif; font-size:14px;
    outline:none; resize:none; max-height:100px; min-height:20px;
  }
  .composer-input::placeholder{color:var(--text-faint);}
  .send-btn{
    width:42px;height:42px; border-radius:50%; border:none;
    background:linear-gradient(135deg, var(--bubble-sent-1), var(--bubble-sent-2)); color:#fff;
    display:flex;align-items:center;justify-content:center; cursor:pointer; flex-shrink:0;
    transition:transform .12s;
  }
  .send-btn:hover{transform:scale(1.06);}
  .send-btn:active{transform:scale(0.94);}
  .send-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

  .img-preview-bar{
    display:none; align-items:center; gap:10px; padding:8px 22px;
    background:rgba(37,99,235,0.10); border-top:1px solid var(--divider);
  }
  .img-preview-bar.show{ display:flex; }
  .img-preview-bar img{ width:44px; height:44px; border-radius:8px; object-fit:cover; border:1px solid var(--divider); }
  .img-preview-info{ flex:1; font-size:12px; color:var(--text-secondary); }
  .img-preview-remove{
    width:26px; height:26px; border-radius:50%; border:none;
    background:var(--bg-panel-hover); color:var(--accent-coral); cursor:pointer; font-size:14px;
  }

  .lightbox{
    position:fixed; inset:0; background:rgba(10,12,18,0.92);
    display:none; align-items:center; justify-content:center; z-index:100; padding:30px;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{ max-width:100%; max-height:100%; border-radius:10px; }
  .lightbox-close{
    position:absolute; top:18px; right:18px; width:38px; height:38px; border-radius:50%;
    background:rgba(255,255,255,0.12); color:#fff; border:none; font-size:16px; cursor:pointer;
  }
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg-panel); color:var(--text-primary); padding:10px 18px; border-radius:10px;
    font-size:12.5px; z-index:200; opacity:0; transition:all 0.25s; pointer-events:none;
    max-width:90%; text-align:center; border:1px solid var(--divider);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error{ border-color:#5b2a2a; color:#ff8a80; }
  .toast.success{ border-color:#204a3a; color:#5eead4; }

  @media (max-width:760px){
    body{padding:0;}
    .app{ max-width:100%; max-height:100vh; max-height:100dvh; border-radius:0; }
    .sidebar{ width:100%; min-width:0; position:absolute; inset:0; z-index:2; transition:transform .25s ease; }
    .chat-area{width:100%;}
    .app.chat-open .sidebar{transform:translateX(-100%);}
    .back-btn{display:flex; align-items:center; justify-content:center;}
    .msg-row{max-width:84%;}
  }
</style>
</head>
<body>

<div class="app" id="app">

  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-mark"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="logo-text">Ryuichi Chat</div>
      </div>
      <div class="menu-wrap">
        <button class="icon-btn" id="menuBtn" title="Menu">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="12" cy="19" r="1.6"></circle></svg>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button class="dropdown-item" id="menuSettings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
            <span>Pengaturan</span>
          </button>
          <button class="dropdown-item danger" onclick="confirmLogout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span>Keluar</span>
          </button>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Cari username...">
      </div>
    </div>

    <div class="chat-list" id="chatList">
      <div class="loading-tab"><div class="spinner"></div>Memuat Kontak...</div>
    </div>

    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path><line x1="8" y1="9" x2="16" y2="9"></line><line x1="8" y1="13" x2="13" y2="13"></line></svg>
        <span>Chat</span>
        <span class="tab-badge" id="badgeChat" style="display:none;"></span>
      </button>
      <button class="nav-tab" data-tab="grup">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3.13a4 4 0 010 7.75"></path><path d="M17 21v-2a4 4 0 00-3-3.87"></path><circle cx="9" cy="7" r="4"></circle><path d="M1 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"></path></svg>
        <span>Grup</span>
        <span class="tab-badge" id="badgeGrup" style="display:none;"></span>
      </button>
      <button class="nav-tab" data-tab="pembaruan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5" stroke-dasharray="3.6 3.4"></circle><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"></circle></svg>
        <span>Pembaruan</span>
      </button>
      <button class="nav-tab" data-tab="beranda">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Beranda</span>
      </button>
    </div>
  </aside>

  <section class="chat-area">
    <div id="chatHeaderWrap"></div>
    <div class="messages" id="messages">
      <div class="chat-empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
        <strong>Belum Ada Percakapan Dipilih</strong>
        <p>Pilih Salah Satu Kontak Untuk Mulai Membalas Pesan.</p>
      </div>
    </div>
    <div class="img-preview-bar" id="imgPreviewBar">
      <img id="imgPreviewThumb" src="">
      <div class="img-preview-info" id="imgPreviewInfo">gambar.jpg</div>
      <button class="img-preview-remove" onclick="clearImagePick()">✕</button>
    </div>
    <div class="composer" id="composerWrap" style="display:none;">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button class="icon-btn" title="Lampirkan gambar" onclick="document.getElementById('fileInput').click()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path></svg>
      </button>
      <textarea class="composer-input" id="composerInput" placeholder="Tulis balasan..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"></path></svg>
      </button>
    </div>
  </section>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
  <img id="lightboxImg" src="">
</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script>
const TOKEN = localStorage.getItem('pg_token');
if (!TOKEN) window.location.href = '/login';
const H = { 'Content-Type': 'application/json', 'x-auth-token': TOKEN };
let ME = localStorage.getItem('pg_user') || '';

function logout() {
  localStorage.removeItem('pg_token');
  localStorage.removeItem('pg_user');
  window.location.href = '/login';
}
function confirmLogout() {
  if (confirm('Keluar dari akun ini?')) logout();
}

const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  const CACHE_TTL = 1 * 60 * 1000;
  try {
    const cached   = localStorage.getItem("pg_api_base");
    const cachedAt = parseInt(localStorage.getItem("pg_api_base_ts") || "0");
    if (cached && (Date.now() - cachedAt < CACHE_TTL)) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) {
        API_BASE = u;
        localStorage.setItem("pg_api_base", u);
        localStorage.setItem("pg_api_base_ts", Date.now().toString());
      }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }

async function verifySession() {
  try {
    await loadApiBase();
    const res  = await fetch(apiUrl('/api/admin/verify'), { headers: H });
    const data = await res.json();
    if (res.status === 401 || res.status === 403 || !data.ok) { logout(); return false; }
    if (data.user) { ME = data.user; localStorage.setItem('pg_user', ME); }
    return true;
  } catch {
    return true;
  }
}

const MIN_IMAGE_BYTES = 1024;
const MAX_IMAGE_BYTES = 5 * 1024 * 1024;

function showToast(text, type = 'info') {
  const el = document.getElementById('toast');
  el.className = `toast show ${type}`;
  document.getElementById('toastText').textContent = text;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getHours().toString().padStart(2, '0') + '.' + d.getMinutes().toString().padStart(2, '0');
}
function fmtDay(iso) {
  const d = new Date(iso);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return 'Hari ini';
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Kemarin';
  return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
}
function relTime(iso) {
  if (!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return 'Baru saja';
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}j`;
  return `${Math.floor(hr / 24)}h`;
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function cleanMsgText(s) {
  return (s || '')
    .replace(/\r\n|[\r\u0085\u2028\u2029\v\f]/g, '\n')
    .replace(/[\u200B\u200C\u200D\uFEFF\u2060]/g, '')
    .replace(/\u00A0/g, ' ')
    .split('\n')
    .map(line => line.replace(/^[ \t]+|[ \t]+$/g, ''))
    .filter(line => line.length > 0)
    .join('\n')
    .trim();
}
const AVATAR_GRADIENTS = [
  'linear-gradient(135deg,#60a5fa,#2563eb)',
  'linear-gradient(135deg,#34d399,#0ea5a4)',
  'linear-gradient(135deg,#f472b6,#ef4444)',
  'linear-gradient(135deg,#a78bfa,#6366f1)',
  'linear-gradient(135deg,#fbbf24,#f97316)',
  'linear-gradient(135deg,#22d3ee,#3b82f6)',
];
function avatarColor(key) {
  let hash = 0;
  for (const ch of String(key)) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
  return AVATAR_GRADIENTS[hash % AVATAR_GRADIENTS.length];
}
function initials(name) {
  const s = String(name || '').trim();
  if (!s) return '?';
  return s[0].toUpperCase();
}

let contactsCache = [];
let groupSummary = null;
let currentTab = 'chat';
let activeType = null;
let activeUser = null;
let pickedImage = null;
let lastMsgSignature = '';
let contactPollTimer = null;
let chatPollTimer = null;

const appEl        = document.getElementById('app');
const chatListEl   = document.getElementById('chatList');
const messagesEl   = document.getElementById('messages');
const headerWrap   = document.getElementById('chatHeaderWrap');
const composerWrap = document.getElementById('composerWrap');
const composerInput= document.getElementById('composerInput');
const sendBtn       = document.getElementById('sendBtn');
const searchInput  = document.getElementById('searchInput');
const menuBtn      = document.getElementById('menuBtn');
const dropdownMenu = document.getElementById('dropdownMenu');

async function loadContacts(silent = false) {
  try {
    const res  = await fetch(apiUrl('/api/chat/contacts'), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal memuat kontak');
    contactsCache = data.contacts || [];
    groupSummary = data.group || null;
    renderChatList();
    renderBadges();
  } catch (e) {
    if (!silent) {
      chatListEl.innerHTML = `<div class="empty-tab">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path></svg>
        <strong>Gagal memuat kontak</strong><p>${escapeHtml(e.message)}</p>
      </div>`;
    }
  }
}

function renderBadges() {
  const chatUnread = contactsCache.reduce((s, c) => s + (c.unread || 0), 0);
  const grupUnread = groupSummary?.unread || 0;
  const bChat = document.getElementById('badgeChat');
  const bGrup = document.getElementById('badgeGrup');
  bChat.style.display = chatUnread > 0 ? 'flex' : 'none';
  bChat.textContent = chatUnread > 99 ? '99+' : chatUnread;
  bGrup.style.display = grupUnread > 0 ? 'flex' : 'none';
  bGrup.textContent = grupUnread > 99 ? '99+' : grupUnread;
}

function renderChatList() {
  const q = (searchInput.value || '').toLowerCase().trim();

  if (currentTab === 'chat') {
    let list = [...contactsCache].sort((a, b) => {
      const ta = a.last ? new Date(a.last.time).getTime() : 0;
      const tb = b.last ? new Date(b.last.time).getTime() : 0;
      return tb - ta;
    });
    if (q) list = list.filter(c => c.username.toLowerCase().includes(q));

    if (!list.length) {
      chatListEl.innerHTML = `<div class="empty-tab">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
        <strong>${q ? 'Tidak ditemukan' : 'Belum ada pesan masuk'}</strong>
        <p>${q ? 'Coba kata kunci lain.' : 'Pesan dari user akan muncul di sini secara otomatis.'}</p>
      </div>`;
      return;
    }

    chatListEl.innerHTML = list.map(c => contactItemHtml(c)).join('');
    list.forEach(c => {
      const el = document.getElementById(`ci-${cssId(c.username)}`);
      if (el) el.addEventListener('click', () => openChat(c.username));
    });
    return;
  }

  if (currentTab === 'grup') {
    const name = groupSummary?.name || 'Ryuichi Group';
    const lastText = (groupSummary?.last?.text || '').toLowerCase();
    if (q && !name.toLowerCase().includes(q) && !lastText.includes(q)) {
      chatListEl.innerHTML = `<div class="empty-tab"><strong>Tidak ditemukan</strong><p>Coba kata kunci lain.</p></div>`;
      return;
    }
    chatListEl.innerHTML = groupItemHtml(groupSummary);
    const el = document.getElementById('ci-group');
    if (el) el.addEventListener('click', openGroup);
    return;
  }

  const empties = {
    pembaruan: {
      icon:'<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="8.5" stroke-dasharray="3.6 3.4"></circle><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"></circle></svg>',
      title:'Belum ada pembaruan', desc:'Status dan cerita dari kontak kamu bakal tampil di sini.'
    }
  };
  const state = empties[currentTab];
  if (state) chatListEl.innerHTML = `<div class="empty-tab">${state.icon}<strong>${state.title}</strong><p>${state.desc}</p></div>`;
}

function cssId(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g, '_'); }

function contactItemHtml(c) {
  const last = c.last;
  const lastText = last ? (last.type === 'image' ? '📷 Gambar' + (last.text ? `: ${last.text}` : '') : (last.text || '')) : 'Belum ada pesan';
  const time = last ? relTime(last.time) : '';
  return `
    <div class="chat-item${c.unread ? ' unread' : ''}${activeType === 'direct' && activeUser === c.username ? ' active' : ''}" id="ci-${cssId(c.username)}">
      <div class="avatar${c.online ? ' online' : ''}" style="background:${avatarColor(c.username)}">${initials(c.username)}</div>
      <div class="chat-item-body">
        <div class="chat-item-top">
          <div class="chat-item-name">${escapeHtml(c.username)}</div>
          <div class="chat-item-time">${time}</div>
        </div>
        <div class="chat-item-bottom">
          <div class="chat-item-msg">${escapeHtml(lastText)}</div>
          ${c.unread ? `<div class="badge">${c.unread > 99 ? '99+' : c.unread}</div>` : ''}
        </div>
      </div>
    </div>`;
}

function groupItemHtml(g) {
  const name = g?.name || 'Ryuichi Group';
  const last = g?.last;
  const lastText = last ? (last.type === 'image' ? '📷 Gambar' + (last.text ? `: ${last.text}` : '') : (last.text || '')) : 'Belum ada pesan';
  const time = last ? relTime(last.time) : '';
  const unread = g?.unread || 0;
  return `
    <div class="chat-item${unread ? ' unread' : ''}${activeType === 'group' ? ' active' : ''}" id="ci-group">
      <div class="avatar" style="background:url('../image/pp_group.jpg') center/cover no-repeat"></div>
      <div class="chat-item-body">
        <div class="chat-item-top">
          <div class="chat-item-name">${escapeHtml(name)}</div>
          <div class="chat-item-time">${time}</div>
        </div>
        <div class="chat-item-bottom">
          <div class="chat-item-msg">${escapeHtml(lastText)}</div>
          ${unread > 0 ? `<div class="badge">${unread > 99 ? '99+' : unread}</div>` : ''}
        </div>
      </div>
    </div>`;
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.dataset.tab === 'beranda') {
      window.location.href = 'dashboard.html';
      return;
    }
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    renderChatList();
  });
});

searchInput.addEventListener('input', renderChatList);

menuBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  dropdownMenu.classList.toggle('show');
});
document.getElementById('menuSettings').addEventListener('click', function () {
  dropdownMenu.classList.remove('show');
  window.location.href = 'profil.html';
});
document.addEventListener('click', function (e) {
  if (!dropdownMenu.contains(e.target) && e.target !== menuBtn) {
    dropdownMenu.classList.remove('show');
  }
});

function openChat(username) {
  activeType = 'direct';
  activeUser = username;
  lastMsgSignature = '';

  appEl.classList.add('chat-open');
  const c = contactsCache.find(x => x.username === username);
  renderChatHeader({
    name: username,
    statusText: 'Memuat percakapan...',
    online: c ? !!c.online : false,
    avatarHtml: `<div class="avatar${c && c.online ? ' online' : ''}" style="background:${avatarColor(username)}">${initials(username)}</div>`,
  });
  messagesEl.innerHTML = `<div class="loading-msgs"><div class="spinner"></div>Memuat pesan...</div>`;
  composerWrap.style.display = 'flex';

  renderChatList();
  clearImagePick();
  loadThread(true);
  markRead(username);

  clearInterval(chatPollTimer);
  chatPollTimer = setInterval(() => loadThread(false), 3500);
}

function openGroup() {
  activeType = 'group';
  activeUser = null;
  lastMsgSignature = '';

  appEl.classList.add('chat-open');
  renderChatHeader({
    name: groupSummary?.name || 'Ryuichi Group',
    statusText: 'Grup semua pengguna',
    online: false,
    avatarHtml: `<div class="avatar" style="background:url('../image/pp_group.jpg') center/cover no-repeat"></div>`,
  });
  messagesEl.innerHTML = `<div class="loading-msgs"><div class="spinner"></div>Memuat pesan...</div>`;
  composerWrap.style.display = 'flex';

  renderChatList();
  clearImagePick();
  loadThread(true);
  markGroupRead();

  clearInterval(chatPollTimer);
  chatPollTimer = setInterval(() => loadThread(false), 3500);
}

function renderChatHeader({ name, statusText, online, avatarHtml }) {
  headerWrap.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="back-btn" id="backBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        ${avatarHtml}
        <div style="min-width:0;">
          <div class="chat-header-name">${escapeHtml(name)}</div>
          <div class="chat-header-status" id="chatSubstatus">${escapeHtml(statusText)}</div>
        </div>
      </div>
    </div>`;
  document.getElementById('backBtn').addEventListener('click', () => {
    appEl.classList.remove('chat-open');
    clearInterval(chatPollTimer);
    activeType = null;
    activeUser = null;
  });
}

async function loadThread(scrollToBottom) {
  if (!activeType) return;
  try {
    const endpoint = activeType === 'direct' ? `/api/chat/direct/${encodeURIComponent(activeUser)}` : '/api/chat/group';
    const res  = await fetch(apiUrl(endpoint), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal memuat pesan');
    const messages = data.messages || [];

    const sub = document.getElementById('chatSubstatus');
    if (sub) sub.textContent = `${messages.length} pesan`;

    const sig = messages.map(m => m.id).join(',');
    if (sig === lastMsgSignature && !scrollToBottom) return;
    lastMsgSignature = sig;
    renderMessages(messages, scrollToBottom);
  } catch (e) {
    if (scrollToBottom) {
      messagesEl.innerHTML = `<div class="loading-msgs">Gagal memuat pesan: ${escapeHtml(e.message)}</div>`;
    }
  }
}

function renderMessages(messages, scrollToBottom) {
  if (!messages.length) {
    messagesEl.innerHTML = `<div class="chat-empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
      <strong>Belum ada pesan</strong>
      <p>Belum ada pesan di percakapan ini.</p>
    </div>`;
    return;
  }

  let html = '';
  let lastDay = '';
  messages.forEach(m => {
    const day = fmtDay(m.time);
    if (day !== lastDay) { html += `<div class="date-divider">${day}</div>`; lastDay = day; }
    const side = m.from === ME ? 'out' : 'in';
    const senderLabel = (activeType === 'group' && side === 'in') ? `<div class="msg-sender">${escapeHtml(m.from)}</div>` : '';
    const bodyHtml = m.type === 'image'
      ? `<img class="bubble-img" src="${m.image}" onclick="openLightbox('${m.image}')">${m.text ? `<div class="bubble-text">${escapeHtml(cleanMsgText(m.text))}</div>` : ''}`
      : `<div class="bubble-text">${escapeHtml(cleanMsgText(m.text))}</div>`;
    html += `
      <div class="msg-row ${side}">
        ${senderLabel}
        <div class="bubble">${bodyHtml}<div class="bubble-meta">${fmtTime(m.time)}</div></div>
      </div>`;
  });
  messagesEl.innerHTML = html;
  if (scrollToBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
  else {
    const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
    if (nearBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

async function markRead(username) {
  try {
    await fetch(apiUrl(`/api/chat/direct/${encodeURIComponent(username)}/read`), { method: 'POST', headers: H });
    const c = contactsCache.find(c => c.username === username);
    if (c) c.unread = 0;
    renderChatList();
    renderBadges();
  } catch {}
}
async function markGroupRead() {
  try {
    await fetch(apiUrl('/api/chat/group/read'), { method: 'POST', headers: H });
    if (groupSummary) groupSummary.unread = 0;
    renderChatList();
    renderBadges();
  } catch {}
}

composerInput.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
composerInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

document.getElementById('fileInput').addEventListener('change', function () {
  const file = this.files[0];
  this.value = '';
  if (!file) return;

  if (file.size < MIN_IMAGE_BYTES) { showToast('Gambar terlalu kecil. Minimal ukuran 1 MB.', 'error'); return; }
  if (file.size > MAX_IMAGE_BYTES) { showToast('Gambar terlalu besar. Maksimal ukuran 5 MB.', 'error'); return; }

  const reader = new FileReader();
  reader.onload = () => {
    pickedImage = { dataUrl: reader.result, mime: file.type, name: file.name, size: file.size };
    document.getElementById('imgPreviewThumb').src = reader.result;
    document.getElementById('imgPreviewInfo').textContent = `${file.name} (${(file.size / (1024*1024)).toFixed(2)} MB)`;
    document.getElementById('imgPreviewBar').classList.add('show');
  };
  reader.readAsDataURL(file);
});
function clearImagePick() {
  pickedImage = null;
  document.getElementById('imgPreviewBar').classList.remove('show');
  document.getElementById('imgPreviewThumb').src = '';
}

async function sendMessage() {
  if (!activeType) return;
  const text = cleanMsgText(composerInput.value);
  if (!text && !pickedImage) return;

  sendBtn.disabled = true;
  try {
    const body = pickedImage
      ? { type: 'image', image: pickedImage.dataUrl, mime: pickedImage.mime, text }
      : { type: 'text', text };

    const endpoint = activeType === 'direct' ? `/api/chat/direct/${encodeURIComponent(activeUser)}` : '/api/chat/group';
    const res  = await fetch(apiUrl(endpoint), { method: 'POST', headers: H, body: JSON.stringify(body) });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal mengirim pesan');

    composerInput.value = '';
    composerInput.style.height = 'auto';
    clearImagePick();
    await loadThread(true);
    loadContacts(true);
  } catch (e) {
    showToast(e.message || 'Gagal mengirim pesan', 'error');
  } finally {
    sendBtn.disabled = false;
  }
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightbox').classList.remove('show');
}

(async function init() {
  const ok = await verifySession();
  if (!ok) return;
  await loadContacts();
  clearInterval(contactPollTimer);
  contactPollTimer = setInterval(() => loadContacts(true), 5000);
})();
</script>
</body>
</html>
