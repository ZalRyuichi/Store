<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profil Saya</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  @font-face {
    font-family: 'TitleFont';
    src: url('/font/title.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'LabelFont';
    src: url('/font/label.ttf') format('truetype');
    font-display: swap;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #1E293B;
    --slate:  #94A3B8; --dark:   #FFFFFF; --border: #27272A;
    --white:  #000000; --bg:     #000000;
    --red:    #EF4444; --green:  #10B981; --amber:  #F59E0B;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    padding-bottom: 84px;
  }

  /* ===== TOP NAV ===== */
  .top-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    height: 72px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top-nav-back {
    background: none; border: none; color: var(--dark);
    font-size: 20px; width: 44px; height: 44px;
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .top-nav-back:hover { background: var(--blue-l); color: var(--blue); }
  .top-nav-title {
    font-family: 'TitleFont', 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: 0.3px;
  }

  /* ===== BANNER ===== */
  .profil-banner-wrapper {
    width: 100%;
    margin: 0 0 44px;
  }
  .profil-banner {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
  }
  .profil-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .profil-avatar-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 96px;
    height: 96px;
    cursor: pointer;
  }
  .profil-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid var(--blue);
    overflow: hidden;
    background: #0A0A0A;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  }
  .profil-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-edit-btn {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--blue);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border: 2px solid #000;
    pointer-events: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.45);
  }
  .avatar-loading {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
  }
  .avatar-toast {
    position: fixed;
    bottom: 76px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    white-space: nowrap;
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .avatar-toast.show { opacity: 1; }
  .avatar-toast.success { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .avatar-toast.error { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  /* ===== INFORMASI AKUN HEADING ===== */
  .info-akun-heading {
    max-width: 900px;
    margin: 0 auto;
    padding: 0;
    text-align: left;
  }
  .info-akun-title {
    font-family: 'LabelFont', 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0;
    margin: 0 0 0 20px;
  }
  .info-akun-title i { color: #F97316; font-size: 0.72em; }

  /* ===== INFORMASI AKUN BOX ===== */
  .info-akun-box {
    max-width: 900px;
    margin: 14px auto 0;
    padding: 4px 20px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--slate);
    white-space: nowrap;
  }
  .info-row-label i {
    width: 20px;
    text-align: center;
    font-size: 14px;
  }
  .icon-blue   { color: #60A5FA; }
  .icon-amber  { color: #FCD34D; }
  .icon-green  { color: #34D399; }
  .icon-purple { color: #C4B5FD; }
  .icon-cyan   { color: #67E8F9; }
  .icon-red    { color: #FCA5A5; }
  .info-row-value {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--dark);
    text-align: right;
    overflow-wrap: anywhere;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pw-toggle-btn {
    background: none;
    border: none;
    color: var(--slate);
    font-size: 14px;
    cursor: pointer;
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  .pw-toggle-btn:hover { color: var(--blue); }
  .pw-dots { letter-spacing: 2px; }

  .sewabot-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 700;
  }
  .sewabot-badge.active { background: rgba(16,185,129,0.12); color: var(--green); }
  .sewabot-badge.inactive { background: rgba(148,163,184,0.12); color: var(--slate); }

  /* ===== BOTTOM NAVIGATION ===== */
  .bottom-navbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 58px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    background: transparent;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(148,163,184,0.12);
    z-index: 999;
  }
  .bottom-navbar a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    color: #A3A3A3;
    font-size: 20px;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .bottom-navbar a.active,
  .bottom-navbar a:hover {
    color: #FFFFFF;
  }
</style>
</head>
<body>

<nav class="top-nav">
  <button class="top-nav-back" onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
  <div class="top-nav-title">Profil Saya</div>
</nav>

<div class="profil-banner-wrapper">
  <div class="profil-banner">
    <img src="../image/bg_profil.jpg" alt="Banner Profil"/>
    <div class="profil-avatar-wrap" id="avatar-wrap">
      <div class="profil-avatar">
        <img src="../image/profil.jpg" alt="Foto Profil" id="avatar-img"/>
        <div class="avatar-loading" id="avatar-loading"><i class="fa-solid fa-spinner fa-spin"></i></div>
      </div>
      <div class="avatar-edit-btn"><i class="fa-solid fa-camera"></i></div>
    </div>
  </div>
</div>
<input type="file" id="avatar-input" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none;"/>
<div class="avatar-toast" id="avatar-toast"></div>

<div class="info-akun-heading">
  <div class="info-akun-title"><i class="fa-solid fa-address-card"></i> Informasi Akun</div>
</div>

<div class="info-akun-box">
  <div class="info-row">
    <div class="info-row-label"><i class="fa-solid fa-user icon-blue"></i> Username</div>
    <div class="info-row-value" id="val-username">—</div>
  </div>
  <div class="info-row">
    <div class="info-row-label"><i class="fa-solid fa-lock icon-red"></i> Password</div>
    <div class="info-row-value">
      <span class="pw-dots" id="val-password">••••••••</span>
      <button class="pw-toggle-btn" id="pw-toggle-btn" onclick="togglePassword()">
        <i class="fa-solid fa-eye" id="pw-toggle-icon"></i>
      </button>
    </div>
  </div>
  <div class="info-row">
    <div class="info-row-label"><i class="fa-solid fa-envelope icon-amber"></i> Email</div>
    <div class="info-row-value" id="val-email">—</div>
  </div>
  <div class="info-row">
    <div class="info-row-label"><i class="fa-solid fa-wallet icon-green"></i> Saldo</div>
    <div class="info-row-value" id="val-saldo">—</div>
  </div>
  <div class="info-row">
    <div class="info-row-label"><i class="fa-brands fa-whatsapp icon-cyan" style="font-size:18px"></i> Sewa Bot</div>
    <div class="info-row-value" id="val-sewabot">—</div>
  </div>
  <div class="info-row">
    <div class="info-row-label"><i class="fa-solid fa-calendar-days icon-purple"></i> Akun Di Buat</div>
    <div class="info-row-value" id="val-created">—</div>
  </div>
</div>

<script>
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  const CACHE_TTL = 1 * 60 * 1000;
  try {
    const cached   = localStorage.getItem("pg_api_base");
    const cachedAt = parseInt(localStorage.getItem("pg_api_base_ts") || "0");
    if (cached && (Date.now() - cachedAt < CACHE_TTL)) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) {
        API_BASE = u;
        localStorage.setItem("pg_api_base", u);
        localStorage.setItem("pg_api_base_ts", Date.now().toString());
      }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }
</script>
<script>
const TOKEN = localStorage.getItem('pg_token');
if (!TOKEN) window.location.href = '/login';

const H = { 'Content-Type':'application/json', 'x-auth-token': TOKEN };

function goBack() {
  if (document.referrer && document.referrer.includes(window.location.host)) {
    window.history.back();
  } else if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = '/dashboard.html';
  }
}

function logout() {
  localStorage.removeItem('pg_token');
  localStorage.removeItem('pg_user');
  window.location.href = '/login';
}

function rupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }

function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' +
         d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}

let realPassword = null;
let pwVisible = false;

function togglePassword() {
  if (!realPassword) return;
  pwVisible = !pwVisible;
  const el = document.getElementById('val-password');
  const icon = document.getElementById('pw-toggle-icon');
  if (pwVisible) {
    el.textContent = realPassword;
    el.classList.remove('pw-dots');
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    el.textContent = '••••••••';
    el.classList.add('pw-dots');
    icon.className = 'fa-solid fa-eye';
  }
}

// NOTE: endpoint /api/user/profile belum ada di index.js kalau ini masih baru.
// Perlu ditambahin route yang return { ok, username, email, password, created_at }
async function loadProfile(retry = 2) {
  try {
    const res = await fetch(apiUrl('/api/user/profile'), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (data.ok) {
      document.getElementById('val-username').textContent = data.username || localStorage.getItem('pg_user') || '—';
      document.getElementById('val-email').textContent = data.email || '—';
      document.getElementById('val-created').textContent = fmtDateShort(data.created_at);
      if (data.password) {
        realPassword = data.password;
      }
      if (data.avatar) {
        avatarImg.src = data.avatar + '?t=' + Date.now();
      }
    }
  } catch {
    document.getElementById('val-username').textContent = localStorage.getItem('pg_user') || '—';
    if (retry > 0) {
      localStorage.removeItem("pg_api_base_ts");
      await loadApiBase();
      return loadProfile(retry - 1);
    }
  }
}

async function loadSaldo(retry = 2) {
  try {
    const res = await fetch(apiUrl('/api/balance'), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (data.ok) {
      document.getElementById('val-saldo').textContent = rupiah(data.balance ?? 0);
    }
  } catch {
    if (retry > 0) {
      localStorage.removeItem("pg_api_base_ts");
      await loadApiBase();
      return loadSaldo(retry - 1);
    }
  }
}

async function loadSewaBot(retry = 2) {
  const el = document.getElementById('val-sewabot');
  try {
    const res = await fetch(apiUrl('/api/sewabot/info'), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (data.ok && data.active) {
      const label = data.permanent ? 'Permanen' : fmtDateShort(data.expired_at);
      el.innerHTML = `<span class="sewabot-badge active"><i class="fa-solid fa-circle-check"></i> ${label}</span>`;
    } else {
      el.innerHTML = `<span class="sewabot-badge inactive">Tidak Aktif</span>`;
    }
  } catch {
    if (retry > 0) return loadSewaBot(retry - 1);
  }
}

// ===== FOTO PROFIL =====
const AVATAR_MAX_BYTES = 2 * 1024 * 1024; // 2 MB
const avatarImg     = document.getElementById('avatar-img');
const avatarWrap    = document.getElementById('avatar-wrap');
const avatarInput   = document.getElementById('avatar-input');
const avatarLoading = document.getElementById('avatar-loading');
const avatarToast   = document.getElementById('avatar-toast');
let avatarToastTimer = null;

avatarWrap.addEventListener('click', () => avatarInput.click());

function showAvatarToast(msg, type) {
  clearTimeout(avatarToastTimer);
  avatarToast.textContent = msg;
  avatarToast.className = 'avatar-toast show ' + type;
  avatarToastTimer = setTimeout(() => { avatarToast.className = 'avatar-toast'; }, 2800);
}

function base64Size(dataUrl) {
  const b64 = dataUrl.slice(dataUrl.indexOf(',') + 1);
  const padding = (b64.match(/=+$/) || [''])[0].length;
  return Math.floor((b64.length * 3) / 4) - padding;
}

// Resize + kompres foto di browser biar muat di bawah 2MB sebelum dikirim ke server
function compressImage(file, maxBytes, maxDim = 1024) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        let quality = 0.9;
        const tryCompress = () => {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          if (base64Size(dataUrl) <= maxBytes || quality <= 0.3) {
            resolve(dataUrl);
          } else {
            quality -= 0.1;
            tryCompress();
          }
        };
        tryCompress();
      };
      img.onerror = () => reject(new Error('Gagal Memuat Gambar'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Gagal Membaca File'));
    reader.readAsDataURL(file);
  });
}

async function uploadAvatar(file) {
  if (!file.type.startsWith('image/')) {
    showAvatarToast('File Harus Berupa Gambar', 'error');
    return;
  }

  const prevSrc = avatarImg.src;
  avatarLoading.style.display = 'flex';

  try {
    const dataUrl = await compressImage(file, AVATAR_MAX_BYTES);
    if (base64Size(dataUrl) > AVATAR_MAX_BYTES) {
      throw new Error('Ukuran Foto Terlalu Besar, Maksimal 2 MB');
    }

    avatarImg.src = dataUrl; // preview optimis sambil nunggu upload

    const res = await fetch(apiUrl('/api/user/avatar'), {
      method: 'POST',
      headers: H,
      body: JSON.stringify({ image: dataUrl }),
    });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal Upload Foto Profil');

    avatarImg.src = data.avatar + '?t=' + Date.now();
    showAvatarToast('Foto Profil Berhasil Diperbarui', 'success');
  } catch (err) {
    avatarImg.src = prevSrc;
    showAvatarToast(err.message || 'Gagal Upload Foto Profil', 'error');
  } finally {
    avatarLoading.style.display = 'none';
  }
}

avatarInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) uploadAvatar(file);
  avatarInput.value = '';
});

loadApiBase().then(() => {
  loadProfile();
  loadSaldo();
  loadSewaBot();
});
</script>

  <a href="/dashboard.html" class=""><i class="fa-solid fa-house"></i></a>
  <a href="/home/topup.html" class=""><i class="fa-solid fa-wallet"></i></a>
  <a href="/home/produk.html" class=""><i class="fa-solid fa-box-open"></i></a>

  <a href="/tools.html" class=""><i class="fa-solid fa-wrench"></i></a>
</nav>
</body>
