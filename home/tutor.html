<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tutorial Pasang Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<style>
  @font-face {
    font-family: 'TitleFont';
    src: url('/font/title.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'LabelFont';
    src: url('/font/label.ttf') format('truetype');
    font-display: swap;
  }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #1E293B;
    --slate:  #94A3B8; --dark:   #FFFFFF; --border: #27272A;
    --white:  #000000; --bg:     #000000;
    --red:    #EF4444; --green:  #10B981; --amber:  #F59E0B;
    --radius: 12px;
  }
  body { background: var(--bg); color: var(--dark); padding-bottom: 24px; }

  /* TOP NAV */
  .top-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .nav-brand-logo {
    width: 58px; height: 58px;
    object-fit: contain;
    border-radius: 10px;
    display: block;
    flex-shrink: 0;
  }
  .nav-brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .nav-brand-title {
    font-family: 'TitleFont', 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: 0.3px;
  }
  .nav-brand-sub {
    font-size: 9.5px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.4px;
    margin-top: 1px;
  }
  .nav-icons {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .nav-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--dark);
    font-size: 22px;
    width: 46px; height: 46px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-icon-btn:hover { background: var(--blue-l); color: var(--blue); }

  /* HEADING (sama seperti Produk Populer di dashboard.html) */
  .produk-populer-heading {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0;
    text-align: left;
  }
  .produk-populer-title {
    font-family: 'LabelFont', 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .produk-populer-title i { color: #F97316; font-size: 0.72em; }
</style>

<style>
  .tutor-hero {
    background: linear-gradient(135deg, #064E3B 0%, #047857 50%, #065F46 100%);
    border-radius: 20px;
    padding: 22px 20px;
    color: #fff;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(4,120,87,0.35);
    position: relative;
    overflow: hidden;
  }
  .tutor-hero::before {
    content: '';
    position: absolute; top: -45px; right: -45px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .tutor-hero-top { display:flex; align-items:center; gap:12px; position:relative; z-index:1; }
  .tutor-hero-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    font-size: 20px; flex-shrink: 0;
  }
  .tutor-hero-title { font-size: 16px; font-weight: 800; }
  .tutor-hero-sub { font-size: 11px; opacity: 0.75; }

  .video-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .video-hint {
    font-size: 11px;
    color: var(--slate);
    text-align: center;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">
    <img src="../image/logo.png" alt="Logo" class="nav-brand-logo"/>
    <div class="nav-brand-text">
      <div class="nav-brand-title">RYUICHISTR</div>
      <div class="nav-brand-sub">#BANYAKDISKONNYA</div>
    </div>
  </div>
  <div class="nav-icons">
    <button class="nav-icon-btn" title="Kembali" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
  </div>
</nav>

<main>

  <div class="tutor-hero">
    <div class="tutor-hero-top">
      <div class="tutor-hero-icon"><i class="fa-solid fa-circle-play"></i></div>
      <div>
        <div class="tutor-hero-title">Tutorial Pasang Bot</div>
        <div class="tutor-hero-sub">Panduan Lengkap Cara Menghubungkan Bot WhatsApp</div>
      </div>
    </div>
  </div>

  <div class="produk-populer-heading">
    <div class="produk-populer-title">Video Tutorial <i class="fa-solid fa-video"></i></div>
  </div>
  <div class="card">
    <div class="card-sub" style="margin-bottom:14px">Tonton Video Berikut Untuk Panduan Lengkap Cara Pasang Bot WhatsApp.</div>
    <div class="video-wrap">
      <video controls playsinline preload="metadata">
        <source src="https://raw.githubusercontent.com/ZalRyuichi/Store/main/tutor.mp4" type="video/mp4"/>
        Browser Kamu Tidak Mendukung Video. <a href="https://raw.githubusercontent.com/ZalRyuichi/Store/main/tutor.mp4">Download di sini</a>.
      </video>
    </div>
    <a href="/home/whatsapp.html" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:11px 0;background:#064E3B;border-radius:var(--radius);font-size:13px;font-weight:700;color:#fff;text-decoration:none;">
      <i class="fa-solid fa-link"></i> Hubungkan Sekarang
    </a>
  </div>

</main>


<script src="shared.js"></script>
<script>
function onApiReady() {}
</script>
</body>
</html>
