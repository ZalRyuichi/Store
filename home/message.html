<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Hubungi Kami</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #EFF6FF;
    --slate:  #64748B; --dark:   #0F172A; --border: #E2E8F0;
    --white:  #FFFFFF; --bg:     #F8FAFC;
    --red:    #EF4444; --green:  #10B981; --amber:  #F59E0B;
    --radius: 12px;
  }
  html, body { height: 100%; height: 100dvh; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
  }

  /* ---------- Top nav ---------- */
  .top-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .back-link {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--slate); text-decoration: none; font-size: 15px;
    border: 1px solid var(--border); flex-shrink: 0;
    transition: all 0.15s;
  }
  .back-link:hover { background: var(--blue-l); color: var(--blue); border-color: var(--blue); }
  .owner-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .nav-title-wrap { min-width: 0; }
  .nav-title { font-size: 14px; font-weight: 800; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nav-sub { font-size: 10.5px; color: var(--slate); display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
  .btn-logout {
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--slate);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-logout:hover { background: #FEF2F2; color: var(--red); border-color: #FECACA; }

  /* ---------- Chat pane ---------- */
  .chat-pane {
    height: calc(100vh - 56px);
    height: calc(100dvh - 56px);
    display: flex;
    flex-direction: column;
    background: #EAEFF3;
    background-image:
      radial-gradient(circle, rgba(37,99,235,0.035) 1px, transparent 1px);
    background-size: 18px 18px;
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .messages-area::-webkit-scrollbar { width: 5px; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(37,99,235,0.15); border-radius: 4px; }

  .day-divider {
    align-self: center;
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--border);
    color: var(--slate);
    font-size: 10.5px; font-weight: 600;
    padding: 3px 12px; border-radius: 20px;
    margin: 8px 0;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;   /* jangan stretch vertikal, ngikutin isi aja */
    max-width: 78%;
    width: fit-content;
  }
  .msg-row.in  { align-self: flex-start; }
  .msg-row.out { align-self: flex-end; }

  .bubble {
    display: inline-block;
    width: fit-content;
    max-width: 100%;
    max-height: 260px;       /* pagar terakhir: seaneh apapun isinya, bubble nggak akan meledak tinggi */
    overflow-y: auto;
    padding: 6px 10px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.28;
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .bubble > div:first-child { margin: 0; }
  .bubble-text { white-space: pre-wrap; }
  .bubble::-webkit-scrollbar { width: 4px; }
  .bubble::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  .msg-row.in .bubble {
    background: var(--white);
    color: var(--dark);
    border-bottom-left-radius: 4px;
  }
  .msg-row.out .bubble {
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble-img {
    max-width: 220px;
    border-radius: 10px;
    display: block;
    cursor: zoom-in;
    margin-bottom: 3px;
  }
  .bubble-time {
    font-size: 9px;
    margin-top: 1px;
    text-align: right;
    opacity: 0.7;
    display: flex; align-items: center; justify-content: flex-end; gap: 4px;
  }
  .msg-row.in .bubble-time { color: var(--slate); }
  .msg-row.out .bubble-time { color: rgba(255,255,255,0.8); }

  .chat-empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--slate); gap: 10px; padding: 20px; text-align: center;
  }
  .chat-empty-state i { font-size: 40px; color: var(--border); }
  .chat-empty-state h3 { font-size: 15px; color: var(--dark); font-weight: 700; }
  .chat-empty-state p { font-size: 12.5px; max-width: 280px; }

  .loading-spin { text-align: center; padding: 30px; color: var(--slate); font-size: 13px; margin: auto; }

  /* ---------- Composer ---------- */
  .composer {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: flex-end; gap: 8px;
    flex-shrink: 0;
  }
  .composer-attach {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--slate); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all 0.15s;
  }
  .composer-attach:hover { background: var(--blue-l); color: var(--blue); border-color: var(--blue); }
  .composer-input-wrap { flex: 1; }
  .composer textarea {
    width: 100%;
    max-height: 100px;
    min-height: 38px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    resize: none;
    outline: none;
    background: var(--bg);
  }
  .composer textarea:focus { border-color: var(--blue); background: var(--white); }
  .composer-send {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--blue); color: #fff; border: none;
    font-size: 14px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .composer-send:hover { background: var(--blue-d); }
  .composer-send:disabled { background: var(--border); cursor: not-allowed; }

  .img-preview-bar {
    display: none;
    align-items: center; gap: 10px;
    padding: 8px 14px;
    background: var(--blue-l);
    border-top: 1px solid var(--border);
  }
  .img-preview-bar.show { display: flex; }
  .img-preview-bar img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
  .img-preview-info { flex: 1; font-size: 12px; color: var(--slate); }
  .img-preview-remove {
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: var(--white); color: var(--red); cursor: pointer; font-size: 12px;
  }

  /* ---------- Lightbox ---------- */
  .lightbox {
    position: fixed; inset: 0; background: rgba(15,23,42,0.9);
    display: none; align-items: center; justify-content: center; z-index: 100;
    padding: 30px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 18px; right: 18px;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.12); color: #fff; border: none;
    font-size: 16px; cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--dark); color: #fff; padding: 10px 18px; border-radius: 10px;
    font-size: 12.5px; z-index: 200; opacity: 0; transition: all 0.25s; pointer-events: none;
    display: flex; align-items: center; gap: 8px; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error i { color: var(--red); }
  .toast.success i { color: var(--green); }
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-left">
    <a href="/dashboard.html" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="owner-avatar"><i class="fa-solid fa-headset"></i></div>
    <div class="nav-title-wrap">
      <div class="nav-title">Ryuichi Message</div>
      <div class="nav-sub"><span class="status-dot"></span> Online</div>
    </div>
  </div>
</div>

<div class="chat-pane" id="chat-pane">
  <div class="messages-area" id="messages-area">
    <div class="loading-spin"><i class="fa-solid fa-spinner fa-spin"></i> Memuat Percakapan...</div>
  </div>

  <div class="img-preview-bar" id="img-preview-bar">
    <img id="img-preview-thumb" src=""/>
    <div class="img-preview-info" id="img-preview-info">gambar.jpg</div>
    <button class="img-preview-remove" onclick="clearImagePick()"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <div class="composer">
    <input type="file" id="file-input" accept="image/*" style="display:none">
    <div class="composer-attach" onclick="document.getElementById('file-input').click()">
      <i class="fa-solid fa-paperclip"></i>
    </div>
    <div class="composer-input-wrap">
      <textarea id="msg-input" placeholder="Tulis pesan..." rows="1"></textarea>
    </div>
    <button class="composer-send" id="send-btn" onclick="sendMessage()">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)"><i class="fa-solid fa-xmark"></i></button>
  <img id="lightbox-img" src=""/>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-info"></i><span id="toast-text"></span></div>

<script>
/* ---------------------------------------------------------
   API base loader (same convention used across the project)
--------------------------------------------------------- */
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  const CACHE_TTL = 1 * 60 * 1000;
  try {
    const cached   = localStorage.getItem("pg_api_base");
    const cachedAt = parseInt(localStorage.getItem("pg_api_base_ts") || "0");
    if (cached && (Date.now() - cachedAt < CACHE_TTL)) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) {
        API_BASE = u;
        localStorage.setItem("pg_api_base", u);
        localStorage.setItem("pg_api_base_ts", Date.now().toString());
      }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }

/* ---------------------------------------------------------
   Auth / session guard — identical behavior to dashboard.html:
   no token in localStorage -> straight back to /login.
   A 401/403 from the API at any point also forces logout,
   same pattern as loadSaldo() in dashboard.html.
--------------------------------------------------------- */
const TOKEN = localStorage.getItem('pg_token');
if (!TOKEN) window.location.href = '/login';

const H = { 'Content-Type': 'application/json', 'x-auth-token': TOKEN };
const savedUser = localStorage.getItem('pg_user') || 'User';

function logout() {
  localStorage.removeItem('pg_token');
  localStorage.removeItem('pg_user');
  window.location.href = '/login';
}

/* ---------------------------------------------------------
   Planned API contract (implemented in index.js next step):
   GET  /api/messages        -> { ok, messages:[{id,from,type,text,image,time}] }
                                 from: 'user' (this account) or 'owner'
   POST /api/messages        -> body {type:'text',text} | {type:'image',image(base64),mime,text}
                                 -> { ok, message }
   Username is derived server-side from the auth token (x-auth-token),
   same as every other authenticated route in this project.
   Messages persist server-side to data-chat/${username}.json
   and automatically appear in message_owner.html's contact list.
--------------------------------------------------------- */

const MIN_IMAGE_BYTES = 1024; // 1 KB
const MAX_IMAGE_BYTES = 5 * 1024 * 1024;   // 5 MB

let pickedImage = null; // { dataUrl, mime, name, size }
let lastMsgCount = 0;
let pollTimer = null;

function showToast(text, type = 'info') {
  const el = document.getElementById('toast');
  const icon = el.querySelector('i');
  el.className = `toast show ${type}`;
  icon.className = type === 'error' ? 'fa-solid fa-circle-exclamation'
                  : type === 'success' ? 'fa-solid fa-circle-check'
                  : 'fa-solid fa-circle-info';
  document.getElementById('toast-text').textContent = text;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}
function fmtDay(iso) {
  const d = new Date(iso);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) return 'Hari ini';
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Kemarin';
  return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
// Strips invisible unicode chars (zero-width space/joiners, BOM, word joiner,
// nbsp) that a plain [ \t] check misses, then trims each line and collapses
// blank lines, so a message like "oi" stored with hidden "empty" lines
// doesn't blow up the height of its bubble.
function cleanMsgText(s) {
  return (s || '')
    // Normalize EVERY kind of line-break char (CRLF, CR, NEL, LINE/PARAGRAPH
    // SEPARATOR, vertical tab, form feed) to a plain \n first. The bubble
    // uses white-space:pre-wrap, which renders U+2028/U+2029 as real line
    // breaks too — those two were slipping through the old regex, which is
    // what inflated bubble height on short texts like "oi" / "p" / "hai".
    .replace(/\r\n|[\r\u0085\u2028\u2029\v\f]/g, '\n')
    .replace(/[\u200B\u200C\u200D\uFEFF\u2060]/g, '')
    .replace(/\u00A0/g, ' ')
    .split('\n')
    .map(line => line.replace(/^[ \t]+|[ \t]+$/g, ''))
    .filter(line => line.length > 0)
    .join('\n')
    .trim();
}

/* ---------------- Chat thread ---------------- */
async function loadMessages(scrollToBottom) {
  try {
    const res  = await fetch(apiUrl('/api/messages'), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal memuat pesan');
    const messages = data.messages || [];

    if (messages.length === lastMsgCount && !scrollToBottom) return; // nothing new, skip re-render
    lastMsgCount = messages.length;
    renderMessages(messages, scrollToBottom);
  } catch (e) {
    if (scrollToBottom) {
      document.getElementById('messages-area').innerHTML =
        `<div class="chat-empty-state"><i class="fa-solid fa-triangle-exclamation"></i><h3>Gagal memuat pesan</h3><p>${escapeHtml(e.message)}</p></div>`;
    }
  }
}

function renderMessages(messages, scrollToBottom) {
  const area = document.getElementById('messages-area');
  if (!messages.length) {
    area.innerHTML = `<div class="chat-empty-state"><i class="fa-regular fa-comments"></i><h3>Mulai percakapan</h3><p>Kirim pesan ke Admin, biasanya dibalas cepat kok.</p></div>`;
    return;
  }

  let html = '';
  let lastDay = '';
  messages.forEach(m => {
    const day = fmtDay(m.time);
    if (day !== lastDay) {
      html += `<div class="day-divider">${day}</div>`;
      lastDay = day;
    }
    const side = m.from === 'owner' ? 'in' : 'out';
    const bodyHtml = m.type === 'image'
      ? `<img class="bubble-img" src="${m.image}" onclick="openLightbox('${m.image}')">${m.text ? `<div class="bubble-text">${escapeHtml(cleanMsgText(m.text))}</div>` : ''}`
      : `<div class="bubble-text">${escapeHtml(cleanMsgText(m.text))}</div>`;
    html += `
      <div class="msg-row ${side}">
        <div class="bubble">
          ${bodyHtml}
          <div class="bubble-time">${fmtTime(m.time)}</div>
        </div>
      </div>`;
  });
  area.innerHTML = html;
  if (scrollToBottom) area.scrollTop = area.scrollHeight;
  else {
    const nearBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 120;
    if (nearBottom) area.scrollTop = area.scrollHeight;
  }
}

/* ---------------- Sending ---------------- */
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('file-input').addEventListener('change', function() {
  const file = this.files[0];
  this.value = '';
  if (!file) return;

  // Only images between 1 MB and 5 MB are accepted
  if (file.size < MIN_IMAGE_BYTES) {
    showToast('Gambar terlalu kecil. Minimal ukuran 1 MB.', 'error');
    return;
  }
  if (file.size > MAX_IMAGE_BYTES) {
    showToast('Gambar terlalu besar. Maksimal ukuran 5 MB.', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    pickedImage = { dataUrl: reader.result, mime: file.type, name: file.name, size: file.size };
    document.getElementById('img-preview-thumb').src = reader.result;
    document.getElementById('img-preview-info').textContent = `${file.name} (${(file.size / (1024*1024)).toFixed(2)} MB)`;
    document.getElementById('img-preview-bar').classList.add('show');
  };
  reader.readAsDataURL(file);
});

function clearImagePick() {
  pickedImage = null;
  document.getElementById('img-preview-bar').classList.remove('show');
  document.getElementById('img-preview-thumb').src = '';
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = cleanMsgText(input.value);
  if (!text && !pickedImage) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    const body = pickedImage
      ? { type: 'image', image: pickedImage.dataUrl, mime: pickedImage.mime, text }
      : { type: 'text', text };

    const res  = await fetch(apiUrl('/api/messages'), {
      method: 'POST', headers: H, body: JSON.stringify(body)
    });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal mengirim pesan');

    input.value = '';
    input.style.height = 'auto';
    clearImagePick();
    await loadMessages(true);
  } catch (e) {
    showToast(e.message || 'Gagal mengirim pesan', 'error');
  } finally {
    btn.disabled = false;
  }
}

/* ---------------- Lightbox ---------------- */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightbox').classList.remove('show');
}

/* ---------------- Init ---------------- */
(async function init() {
  await loadApiBase();
  await loadMessages(true);
  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadMessages(false), 3500);
})();
</script>
</body>
</html>
