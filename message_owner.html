<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kelola Pesan - Owner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #EFF6FF;
    --slate:  #64748B; --dark:   #0F172A; --border: #E2E8F0;
    --white:  #FFFFFF; --bg:     #F8FAFC;
    --red:    #EF4444; --green:  #10B981; --amber:  #F59E0B;
    --radius: 12px;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
  }

  /* ---------- Top nav ---------- */
  .top-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .back-link {
    width: 32px; height: 32px; border-radius: 8px;
    display: none; align-items: center; justify-content: center;
    color: var(--slate); text-decoration: none; font-size: 15px;
    border: 1px solid var(--border);
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; flex-shrink: 0;
  }
  .nav-title { font-size: 15px; font-weight: 800; color: var(--dark); }
  .nav-title span { color: var(--blue); }
  .btn-logout {
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--slate);
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .btn-logout:hover { background: #FEF2F2; color: var(--red); border-color: #FECACA; }

  /* ---------- Layout ---------- */
  .app-shell {
    height: calc(100vh - 56px);
    display: flex;
  }

  /* ---------- Contact list (sidebar) ---------- */
  .contacts-pane {
    width: 340px;
    flex-shrink: 0;
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .search-wrap { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    outline: none;
  }
  .search-box input:focus { border-color: var(--blue); background: var(--white); }
  .search-box i {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--slate); font-size: 12px;
  }

  .contact-list { flex: 1; overflow-y: auto; }
  .contact-list::-webkit-scrollbar { width: 5px; }
  .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .contact-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 1px solid #F1F5F9;
    transition: background 0.12s;
    position: relative;
  }
  .contact-item:hover { background: var(--bg); }
  .contact-item.active { background: var(--blue-l); }
  .contact-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; flex-shrink: 0; text-transform: uppercase;
  }
  .contact-info { flex: 1; min-width: 0; }
  .contact-top-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .contact-name { font-size: 13.5px; font-weight: 700; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-time { font-size: 10.5px; color: var(--slate); flex-shrink: 0; }
  .contact-preview-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 2px; }
  .contact-preview { font-size: 12px; color: var(--slate); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-item.unread .contact-preview { color: var(--dark); font-weight: 600; }
  .unread-badge {
    background: var(--blue); color: #fff; font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; padding: 0 5px; flex-shrink: 0;
  }

  .empty-contacts {
    padding: 40px 20px; text-align: center; color: var(--slate); font-size: 13px;
  }
  .empty-contacts i { font-size: 28px; margin-bottom: 10px; display: block; color: var(--border); }

  /* ---------- Chat pane ---------- */
  .chat-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #EAEFF3;
    background-image:
      radial-gradient(circle, rgba(37,99,235,0.035) 1px, transparent 1px);
    background-size: 18px 18px;
    min-width: 0;
  }
  .chat-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .chat-header .contact-avatar { width: 36px; height: 36px; font-size: 13px; }
  .chat-header-name { font-size: 14px; font-weight: 700; }
  .chat-header-sub { font-size: 11px; color: var(--slate); }

  .chat-empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--slate); gap: 10px; padding: 20px; text-align: center;
  }
  .chat-empty-state i { font-size: 40px; color: var(--border); }
  .chat-empty-state h3 { font-size: 15px; color: var(--dark); font-weight: 700; }
  .chat-empty-state p { font-size: 12.5px; max-width: 260px; }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .messages-area::-webkit-scrollbar { width: 5px; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(37,99,235,0.15); border-radius: 4px; }

  .day-divider {
    align-self: center;
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--border);
    color: var(--slate);
    font-size: 10.5px; font-weight: 600;
    padding: 3px 12px; border-radius: 20px;
    margin: 8px 0;
  }

  .msg-row { display: flex; max-width: 72%; }
  .msg-row.in  { align-self: flex-start; }
  .msg-row.out { align-self: flex-end; }

  .bubble {
    padding: 8px 11px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.45;
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg-row.in .bubble {
    background: var(--white);
    color: var(--dark);
    border-bottom-left-radius: 4px;
  }
  .msg-row.out .bubble {
    background: linear-gradient(135deg, #2563EB, #1D4ED8);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble-img {
    max-width: 220px;
    border-radius: 10px;
    display: block;
    cursor: zoom-in;
    margin-bottom: 3px;
  }
  .bubble-time {
    font-size: 9.5px;
    margin-top: 3px;
    text-align: right;
    opacity: 0.7;
  }
  .msg-row.in .bubble-time { color: var(--slate); }
  .msg-row.out .bubble-time { color: rgba(255,255,255,0.8); }

  /* ---------- Composer ---------- */
  .composer {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: flex-end; gap: 8px;
    flex-shrink: 0;
  }
  .composer-attach {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--slate); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all 0.15s;
  }
  .composer-attach:hover { background: var(--blue-l); color: var(--blue); border-color: var(--blue); }
  .composer-input-wrap { flex: 1; }
  .composer textarea {
    width: 100%;
    max-height: 100px;
    min-height: 38px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    resize: none;
    outline: none;
    background: var(--bg);
  }
  .composer textarea:focus { border-color: var(--blue); background: var(--white); }
  .composer-send {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--blue); color: #fff; border: none;
    font-size: 14px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .composer-send:hover { background: var(--blue-d); }
  .composer-send:disabled { background: var(--border); cursor: not-allowed; }

  .img-preview-bar {
    display: none;
    align-items: center; gap: 10px;
    padding: 8px 14px;
    background: var(--blue-l);
    border-top: 1px solid var(--border);
  }
  .img-preview-bar.show { display: flex; }
  .img-preview-bar img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
  .img-preview-info { flex: 1; font-size: 12px; color: var(--slate); }
  .img-preview-remove {
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: var(--white); color: var(--red); cursor: pointer; font-size: 12px;
  }

  /* ---------- Lightbox ---------- */
  .lightbox {
    position: fixed; inset: 0; background: rgba(15,23,42,0.9);
    display: none; align-items: center; justify-content: center; z-index: 100;
    padding: 30px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 18px; right: 18px;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.12); color: #fff; border: none;
    font-size: 16px; cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--dark); color: #fff; padding: 10px 18px; border-radius: 10px;
    font-size: 12.5px; z-index: 200; opacity: 0; transition: all 0.25s; pointer-events: none;
    display: flex; align-items: center; gap: 8px; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error i { color: var(--red); }
  .toast.success i { color: var(--green); }

  .loading-spin { text-align: center; padding: 30px; color: var(--slate); font-size: 13px; }

  /* ---------- Mobile ---------- */
  @media (max-width: 760px) {
    .back-link { display: flex; }
    .contacts-pane { width: 100%; border-right: none; }
    .app-shell.chat-open .contacts-pane { display: none; }
    .app-shell:not(.chat-open) .chat-pane { display: none; }
    .msg-row { max-width: 85%; }
  }
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-left">
    <a href="#" id="mobile-back" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="logo-icon"><i class="fa-solid fa-inbox"></i></div>
    <div class="nav-title">Ryuichi<span> Inbox</span></div>
  </div>
  <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
</div>

<div class="app-shell" id="app-shell">

  <div class="contacts-pane">
    <div class="search-wrap">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="contact-search" placeholder="Cari username...">
      </div>
    </div>
    <div class="contact-list" id="contact-list">
      <div class="loading-spin"><i class="fa-solid fa-spinner fa-spin"></i> Memuat kontak...</div>
    </div>
  </div>

  <div class="chat-pane" id="chat-pane">
    <div class="chat-empty-state" id="chat-empty-state">
      <i class="fa-regular fa-comments"></i>
      <h3>Belum ada percakapan dipilih</h3>
      <p>Pilih salah satu kontak di sebelah kiri untuk mulai membalas pesan.</p>
    </div>

    <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <div class="contact-avatar" id="chat-avatar">?</div>
        <div>
          <div class="chat-header-name" id="chat-username">-</div>
          <div class="chat-header-sub" id="chat-substatus">-</div>
        </div>
      </div>

      <div class="messages-area" id="messages-area"></div>

      <div class="img-preview-bar" id="img-preview-bar">
        <img id="img-preview-thumb" src=""/>
        <div class="img-preview-info" id="img-preview-info">gambar.jpg</div>
        <button class="img-preview-remove" onclick="clearImagePick()"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="composer">
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div class="composer-attach" onclick="document.getElementById('file-input').click()">
          <i class="fa-solid fa-paperclip"></i>
        </div>
        <div class="composer-input-wrap">
          <textarea id="msg-input" placeholder="Tulis balasan..." rows="1"></textarea>
        </div>
        <button class="composer-send" id="send-btn" onclick="sendMessage()">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(event)"><i class="fa-solid fa-xmark"></i></button>
  <img id="lightbox-img" src=""/>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-info"></i><span id="toast-text"></span></div>

<script>
/* ---------------------------------------------------------
   API base loader (same convention used across the project)
--------------------------------------------------------- */
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  const CACHE_TTL = 1 * 60 * 1000;
  try {
    const cached   = localStorage.getItem("pg_api_base");
    const cachedAt = parseInt(localStorage.getItem("pg_api_base_ts") || "0");
    if (cached && (Date.now() - cachedAt < CACHE_TTL)) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) {
        API_BASE = u;
        localStorage.setItem("pg_api_base", u);
        localStorage.setItem("pg_api_base_ts", Date.now().toString());
      }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }

/* ---------------------------------------------------------
   Auth / session guard — same behavior as dashboard.html:
   no token -> straight back to /login. Session gets verified
   against the owner-only endpoint; invalid/expired -> logout.
--------------------------------------------------------- */
const TOKEN = localStorage.getItem('pg_token');
if (!TOKEN) window.location.href = '/login';

const H = { 'Content-Type': 'application/json', 'x-auth-token': TOKEN };

function logout() {
  localStorage.removeItem('pg_token');
  localStorage.removeItem('pg_user');
  window.location.href = '/login';
}

async function verifySession() {
  try {
    await loadApiBase();
    const res  = await fetch(apiUrl('/api/admin/verify'), { headers: H });
    const data = await res.json();
    if (res.status === 401 || res.status === 403 || !data.ok) { logout(); return false; }
    return true;
  } catch {
    // network hiccup: don't kick the owner out, just retry silently on next poll
    return true;
  }
}

/* ---------------------------------------------------------
   Planned API contract (implemented in index.js next step):
   GET  /api/owner/messages/contacts          -> { ok, contacts:[{username,last_text,last_type,last_time,unread}] }
   GET  /api/owner/messages/:username         -> { ok, messages:[{id,from,type,text,image,time}] }
   POST /api/owner/messages/:username         -> body {type:'text',text} | {type:'image',image(base64),mime} -> { ok, message }
   POST /api/owner/messages/:username/read    -> marks the thread as read -> { ok }
   All routes are adminAuth protected (x-auth-token header, owner only).
   Messages persist server-side to data-chat/${username}.json
--------------------------------------------------------- */

const MIN_IMAGE_BYTES = 1 * 1024 * 1024;   // 1 MB
const MAX_IMAGE_BYTES = 5 * 1024 * 1024;   // 5 MB

let contactsCache = [];
let activeUser = null;
let pickedImage = null; // { dataUrl, mime, name, size }
let lastMsgCount = 0;
let contactPollTimer = null;
let chatPollTimer = null;

function showToast(text, type = 'info') {
  const el = document.getElementById('toast');
  const icon = el.querySelector('i');
  el.className = `toast show ${type}`;
  icon.className = type === 'error' ? 'fa-solid fa-circle-exclamation'
                  : type === 'success' ? 'fa-solid fa-circle-check'
                  : 'fa-solid fa-circle-info';
  document.getElementById('toast-text').textContent = text;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

function initials(name) {
  return (name || '?').trim().slice(0, 2).toUpperCase();
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}
function fmtDay(iso) {
  const d = new Date(iso);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) return 'Hari ini';
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Kemarin';
  return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
}
function relTime(iso) {
  if (!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return 'Baru saja';
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}j`;
  return `${Math.floor(hr / 24)}h`;
}

/* ---------------- Contact list ---------------- */
async function loadContacts(silent = false) {
  try {
    const res  = await fetch(apiUrl('/api/owner/messages/contacts'), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal memuat kontak');
    contactsCache = data.contacts || [];
    renderContacts();
  } catch (e) {
    if (!silent) {
      document.getElementById('contact-list').innerHTML =
        `<div class="empty-contacts"><i class="fa-solid fa-triangle-exclamation"></i>Gagal memuat kontak.<br>${e.message}</div>`;
    }
  }
}

function renderContacts() {
  const wrap = document.getElementById('contact-list');
  const q = (document.getElementById('contact-search').value || '').toLowerCase().trim();

  let list = [...contactsCache].sort((a, b) => new Date(b.last_time || 0) - new Date(a.last_time || 0));
  if (q) list = list.filter(c => c.username.toLowerCase().includes(q));

  if (!list.length) {
    wrap.innerHTML = `<div class="empty-contacts"><i class="fa-regular fa-comment-dots"></i>${q ? 'Tidak ada kontak yang cocok.' : 'Belum ada pesan masuk dari user.'}</div>`;
    return;
  }

  wrap.innerHTML = list.map(c => {
    const preview = c.last_type === 'image' ? '📷 Gambar' : (c.last_text || '');
    return `
    <div class="contact-item ${activeUser === c.username ? 'active' : ''} ${c.unread ? 'unread' : ''}" onclick="openChat('${c.username.replace(/'/g, "\\'")}')">
      <div class="contact-avatar">${initials(c.username)}</div>
      <div class="contact-info">
        <div class="contact-top-row">
          <div class="contact-name">${c.username}</div>
          <div class="contact-time">${relTime(c.last_time)}</div>
        </div>
        <div class="contact-preview-row">
          <div class="contact-preview">${preview}</div>
          ${c.unread ? `<div class="unread-badge">${c.unread > 99 ? '99+' : c.unread}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('contact-search').addEventListener('input', renderContacts);

/* ---------------- Chat thread ---------------- */
async function openChat(username) {
  activeUser = username;
  lastMsgCount = 0;

  document.getElementById('app-shell').classList.add('chat-open');
  document.getElementById('chat-empty-state').style.display = 'none';
  document.getElementById('chat-active').style.display = 'flex';
  document.getElementById('chat-avatar').textContent = initials(username);
  document.getElementById('chat-username').textContent = username;
  document.getElementById('chat-substatus').textContent = 'Memuat percakapan...';
  document.getElementById('messages-area').innerHTML = `<div class="loading-spin"><i class="fa-solid fa-spinner fa-spin"></i> Memuat pesan...</div>`;

  renderContacts();
  clearImagePick();
  await loadMessages(true);
  markRead(username);

  clearInterval(chatPollTimer);
  chatPollTimer = setInterval(() => loadMessages(false), 3500);
}

async function loadMessages(scrollToBottom) {
  if (!activeUser) return;
  try {
    const res  = await fetch(apiUrl(`/api/owner/messages/${encodeURIComponent(activeUser)}`), { headers: H });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal memuat pesan');
    const messages = data.messages || [];

    document.getElementById('chat-substatus').textContent = `${messages.length} pesan`;

    if (messages.length === lastMsgCount && !scrollToBottom) return; // nothing new, skip re-render
    lastMsgCount = messages.length;
    renderMessages(messages, scrollToBottom);
  } catch (e) {
    if (scrollToBottom) {
      document.getElementById('messages-area').innerHTML =
        `<div class="loading-spin"><i class="fa-solid fa-triangle-exclamation"></i> Gagal memuat pesan: ${e.message}</div>`;
    }
  }
}

function renderMessages(messages, scrollToBottom) {
  const area = document.getElementById('messages-area');
  if (!messages.length) {
    area.innerHTML = `<div class="loading-spin">Belum ada pesan di percakapan ini.</div>`;
    return;
  }

  let html = '';
  let lastDay = '';
  messages.forEach(m => {
    const day = fmtDay(m.time);
    if (day !== lastDay) {
      html += `<div class="day-divider">${day}</div>`;
      lastDay = day;
    }
    const side = m.from === 'owner' ? 'out' : 'in';
    const bodyHtml = m.type === 'image'
      ? `<img class="bubble-img" src="${m.image}" onclick="openLightbox('${m.image}')">${m.text ? `<div>${escapeHtml(m.text)}</div>` : ''}`
      : `<div>${escapeHtml(m.text || '')}</div>`;
    html += `
      <div class="msg-row ${side}">
        <div class="bubble">
          ${bodyHtml}
          <div class="bubble-time">${fmtTime(m.time)}</div>
        </div>
      </div>`;
  });
  area.innerHTML = html;
  if (scrollToBottom) area.scrollTop = area.scrollHeight;
  else {
    const nearBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 120;
    if (nearBottom) area.scrollTop = area.scrollHeight;
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

async function markRead(username) {
  try {
    await fetch(apiUrl(`/api/owner/messages/${encodeURIComponent(username)}/read`), {
      method: 'POST', headers: H
    });
    const c = contactsCache.find(c => c.username === username);
    if (c) c.unread = 0;
    renderContacts();
  } catch {}
}

/* ---------------- Sending ---------------- */
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('file-input').addEventListener('change', function() {
  const file = this.files[0];
  this.value = '';
  if (!file) return;

  // Owner-specified constraint: only images between 1 MB and 5 MB are accepted
  if (file.size < MIN_IMAGE_BYTES) {
    showToast('Gambar terlalu kecil. Minimal ukuran 1 MB.', 'error');
    return;
  }
  if (file.size > MAX_IMAGE_BYTES) {
    showToast('Gambar terlalu besar. Maksimal ukuran 5 MB.', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    pickedImage = { dataUrl: reader.result, mime: file.type, name: file.name, size: file.size };
    document.getElementById('img-preview-thumb').src = reader.result;
    document.getElementById('img-preview-info').textContent = `${file.name} (${(file.size / (1024*1024)).toFixed(2)} MB)`;
    document.getElementById('img-preview-bar').classList.add('show');
  };
  reader.readAsDataURL(file);
});

function clearImagePick() {
  pickedImage = null;
  document.getElementById('img-preview-bar').classList.remove('show');
  document.getElementById('img-preview-thumb').src = '';
}

async function sendMessage() {
  if (!activeUser) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !pickedImage) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  try {
    const body = pickedImage
      ? { type: 'image', image: pickedImage.dataUrl, mime: pickedImage.mime, text }
      : { type: 'text', text };

    const res  = await fetch(apiUrl(`/api/owner/messages/${encodeURIComponent(activeUser)}`), {
      method: 'POST', headers: H, body: JSON.stringify(body)
    });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || 'Gagal mengirim pesan');

    input.value = '';
    input.style.height = 'auto';
    clearImagePick();
    await loadMessages(true);
    loadContacts(true);
  } catch (e) {
    showToast(e.message || 'Gagal mengirim pesan', 'error');
  } finally {
    btn.disabled = false;
  }
}

/* ---------------- Lightbox ---------------- */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(e) {
  if (e) e.stopPropagation();
  document.getElementById('lightbox').classList.remove('show');
}

/* ---------------- Mobile back ---------------- */
document.getElementById('mobile-back').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('app-shell').classList.remove('chat-open');
  clearInterval(chatPollTimer);
  activeUser = null;
});

/* ---------------- Init ---------------- */
(async function init() {
  const ok = await verifySession();
  if (!ok) return;
  await loadContacts();
  clearInterval(contactPollTimer);
  contactPollTimer = setInterval(() => loadContacts(true), 5000);
})();
</script>
