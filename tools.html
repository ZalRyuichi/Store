<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  @font-face {
    font-family: 'TitleFont';
    src: url('/font/title.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'LabelFont';
    src: url('/font/label.ttf') format('truetype');
    font-display: swap;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .sewabot-fab {
    position: fixed; left: 16px; bottom: calc(58px + env(safe-area-inset-bottom, 0) + 12px);
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: #fff; border: none; cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    z-index: 50; transition: transform 0.2s;
  }
  .sewabot-fab:active { transform: scale(0.94); }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #1E293B;
    --slate:  #94A3B8; --dark:   #FFFFFF; --border: #27272A;
    --white:  #000000; --bg:     #000000;
    --red:    #EF4444; --green:  #10B981; --amber:  #F59E0B;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    padding-bottom: 84px;
  }

  /* TOP NAV */
  .top-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .nav-brand-logo {
    width: 58px; height: 58px;
    object-fit: contain;
    border-radius: 10px;
    display: block;
    flex-shrink: 0;
  }
  .nav-brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .nav-brand-title {
    font-family: 'TitleFont', 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: 0.3px;
  }
  .nav-brand-sub {
    font-size: 9.5px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.4px;
    margin-top: 1px;
  }
  .nav-icons {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .nav-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--dark);
    font-size: 22px;
    width: 46px; height: 46px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-icon-btn:hover { background: var(--blue-l); color: var(--blue); }

  /* SIDEBAR */
  .sidebar {
    position: fixed; right: 0; top: 0; width: 280px; height: 100vh;
    background: linear-gradient(180deg, #0B0E14 0%, #000000 100%);
    border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.3s ease;
    z-index: 99; padding-top: 0; overflow-y: auto;
    box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  .sidebar.show { transform: translateX(0); }

  .sidebar-header {
    position: sticky; top: 0; z-index: 10;
    width: 100%; height: 150px;
    padding: 0; margin: 0;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  .sidebar-logo-img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
  }

  .sidebar-content {
    padding: 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .sidebar-section {
    display: flex; flex-direction: column; gap: 3px;
  }

  .sidebar-section-title {
    font-size: 10px; font-weight: 700; color: var(--slate);
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 6px 14px; opacity: 0.7;
  }

  .sidebar-menu {
    display: flex; flex-direction: column; gap: 2px;
  }

  .sidebar-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px; border-radius: 11px;
    text-decoration: none; color: var(--dark);
    font-size: 13px; font-weight: 500;
    transition: all 0.2s;
    position: relative;
    border: 1px solid transparent;
  }

  .sidebar-item:hover {
    background: rgba(37,99,235,0.08);
    border-color: rgba(37,99,235,0.15);
    color: var(--blue);
    padding-left: 16px;
  }

  .sidebar-item i {
    font-size: 14px; width: 20px; text-align: center;
    transition: all 0.2s;
  }

  .sidebar-item:hover i { color: var(--blue); transform: translateX(2px); }

  .sidebar-divider {
    height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 6px 0;
  }

  .sidebar-btn {
    padding: 10px 14px; border: none; border-radius: 11px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }

  .sidebar-btn.logout {
    background: rgba(239,68,68,0.08);
    color: var(--red); border: 1px solid rgba(239,68,68,0.3);
    width: 100%; justify-content: center; margin-top: 6px;
  }

  .sidebar-btn.logout:hover {
    background: var(--red);
    color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.3);
  }

  .sidebar-btn.logout:active { transform: scale(0.97); }
  .sidebar-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 98;
  }
  .sidebar-overlay.show { opacity: 0.5; pointer-events: all; }

  /* PAGE HEAD */
  main { max-width: 900px; margin: 0 auto; padding: 0 20px; }

  .banner-wrapper {
    width: 100%;
    margin: 20px auto 0;
  }
  .banner-inner {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    perspective: 1200px;
    overflow: hidden;
  }
  .banner-slides {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .banner-slide {
    position: absolute;
    top: 50%;
    left: 50%;
    aspect-ratio: 16 / 9;
    border-radius: 14px;
    overflow: hidden;
    transform-origin: 50% 50%;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1), opacity 0.7s ease, width 0.7s cubic-bezier(.4,0,.2,1);
    will-change: transform, opacity, width;
  }
  .banner-slide.pos-active { width: 92%; transform: translate(-50%, -50%) rotateY(0deg); opacity: 1; z-index: 3; }
  .banner-slide.pos-prev   { width: 60%; transform: translate(-143%, -50%) rotateY(32deg); opacity: 0.55; z-index: 2; }
  .banner-slide.pos-next   { width: 60%; transform: translate(43%, -50%) rotateY(-32deg); opacity: 0.55; z-index: 2; }
  .banner-slide.pos-hidden { width: 60%; transform: translate(-50%, -50%) scale(0.4); opacity: 0; z-index: 1; pointer-events: none; }
  .banner-slide img {
    width: 100%;
    height: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .page-head {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0;
    text-align: left;
  }
  .page-head-title {
    font-family: 'LabelFont', 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .page-head-title i { color: var(--blue); font-size: 0.72em; }
  .page-head-sub { font-size: 12px; color: var(--slate); }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 18px;
  }
  .tool-box {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    text-decoration: none; color: var(--dark); text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .tool-box:hover { transform: translateY(-2px); border-color: rgba(37,99,235,0.35); box-shadow: 0 4px 16px rgba(37,99,235,0.15); }
  .tool-box-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
  }
  .tool-box-label { font-size: 13px; font-weight: 700; }
  .tool-box-desc { font-size: 11px; color: var(--slate); }

  /* ===== BOTTOM NAVIGATION ===== */
  .bottom-navbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 58px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    background: transparent;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(148,163,184,0.12);
    z-index: 999;
  }
  .bottom-navbar a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    color: #A3A3A3;
    font-size: 20px;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .bottom-navbar a.active,
  .bottom-navbar a:hover {
    color: #FFFFFF;
  }
</style>
</head>

(function(){

  var _admBase = (localStorage.getItem('pg_api_base') || '').trim();
  fetch((_admBase ? _admBase : '') + '/api/admin/verify', { headers: { 'x-auth-token': _admToken } })

<script>
function logout() {
  localStorage.removeItem('pg_token');
  localStorage.removeItem('pg_user');
  window.location.href = '/login';
}

const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  const CACHE_TTL = 1 * 60 * 1000;
  try {
    const cached   = localStorage.getItem("pg_api_base");
    const cachedAt = parseInt(localStorage.getItem("pg_api_base_ts") || "0");
    if (cached && (Date.now() - cachedAt < CACHE_TTL)) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) {
        API_BASE = u;
        localStorage.setItem("pg_api_base", u);
        localStorage.setItem("pg_api_base_ts", Date.now().toString());
      }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }
const H = { 'Content-Type': 'application/json', 'x-auth-token': TOKEN };

async function refreshSewaBotFloating(retry = 2) {
  try {
    const res = await fetch(apiUrl('/api/sewabot/info'), { headers: H });
    if (res.status === 401 || res.status === 403) return;
    const data = await res.json();

    let fab = document.getElementById('sewabot-fab');
    if (data.ok && data.active) {
      if (!fab) {
        fab = document.createElement('a');
        fab.id = 'sewabot-fab';
        fab.className = 'sewabot-fab';
        fab.title = 'Sewa Bot WhatsApp';
        fab.innerHTML = '<i class="fa-brands fa-whatsapp"></i>';
        fab.href = '/home/whatsapp.html';
        document.body.appendChild(fab);
      }
    } else if (fab) {
      fab.remove();
    }
  } catch {
    if (retry > 0) return refreshSewaBotFloating(retry - 1);
  }
}

loadApiBase().then(() => { refreshSewaBotFloating(); });

(function(){
  const slides = Array.from(document.querySelectorAll('#banner-slides .banner-slide'));
  const n = slides.length;
  let idx = 0;

  function render() {
    slides.forEach((el, i) => {
      let diff = i - idx;
      diff = ((diff % n) + n) % n;
      if (diff > Math.floor(n / 2)) diff -= n;
      el.classList.remove('pos-active', 'pos-prev', 'pos-next', 'pos-hidden');
      if (diff === 0) el.classList.add('pos-active');
      else if (diff === -1) el.classList.add('pos-prev');
      else if (diff === 1) el.classList.add('pos-next');
      else el.classList.add('pos-hidden');
    });
  }

  function next() {
    idx = (idx + 1) % n;
    render();
  }

  render();
  setInterval(next, 2000);
})();
</script>
