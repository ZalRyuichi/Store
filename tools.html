<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tools</title>
<script>
  const TOKEN = localStorage.getItem('pg_token');
  if (!TOKEN) window.location.href = '/login';
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  @font-face {
    font-family: 'TitleFont';
    src: url('/font/title.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'LabelFont';
    src: url('/font/label.ttf') format('truetype');
    font-display: swap;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #1E293B;
    --slate:  #94A3B8; --dark:   #FFFFFF; --border: #27272A;
    --white:  #000000; --bg:     #000000;
    --red:    #EF4444; --green:  #10B981; --amber:  #F59E0B;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    padding-bottom: 84px;
  }

  /* TOP NAV */
  .top-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .nav-brand-logo {
    width: 58px; height: 58px;
    object-fit: contain;
    border-radius: 10px;
    display: block;
    flex-shrink: 0;
  }
  .nav-brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.15;
  }
  .nav-brand-title {
    font-family: 'TitleFont', 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--dark);
    letter-spacing: 0.3px;
  }
  .nav-brand-sub {
    font-size: 9.5px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.4px;
    margin-top: 1px;
  }
  .nav-icons {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .nav-icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--dark);
    font-size: 22px;
    width: 46px; height: 46px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-icon-btn:hover { background: var(--blue-l); color: var(--blue); }

  /* SIDEBAR */
  .sidebar {
    position: fixed; right: 0; top: 0; width: 280px; height: 100vh;
    background: linear-gradient(180deg, #0B0E14 0%, #000000 100%);
    border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.3s ease;
    z-index: 99; padding-top: 0; overflow-y: auto;
    box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  .sidebar.show { transform: translateX(0); }

  .sidebar-header {
    position: sticky; top: 0; z-index: 10;
    width: 100%; height: 150px;
    padding: 0; margin: 0;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  .sidebar-logo-img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
  }

  .sidebar-content {
    padding: 20px 12px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .sidebar-section {
    display: flex; flex-direction: column; gap: 6px;
  }

  .sidebar-section-title {
    font-size: 10px; font-weight: 700; color: var(--slate);
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 8px 14px; opacity: 0.7;
  }

  .sidebar-menu {
    display: flex; flex-direction: column; gap: 4px;
  }

  .sidebar-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 11px;
    text-decoration: none; color: var(--dark);
    font-size: 13px; font-weight: 500;
    transition: all 0.2s;
    position: relative;
    border: 1px solid transparent;
  }

  .sidebar-item:hover {
    background: rgba(37,99,235,0.08);
    border-color: rgba(37,99,235,0.15);
    color: var(--blue);
    padding-left: 16px;
  }

  .sidebar-item i {
    font-size: 14px; width: 20px; text-align: center;
    transition: all 0.2s;
  }

  .sidebar-item:hover i { color: var(--blue); transform: translateX(2px); }

  .sidebar-divider {
    height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 8px 0;
  }

  .sidebar-btn {
    padding: 12px 14px; border: none; border-radius: 11px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
  }

  .sidebar-btn.logout {
    background: rgba(239,68,68,0.08);
    color: var(--red); border: 1px solid rgba(239,68,68,0.3);
    width: 100%; justify-content: center; margin-top: 12px;
  }

  .sidebar-btn.logout:hover {
    background: var(--red);
    color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.3);
  }

  .sidebar-btn.logout:active { transform: scale(0.97); }
  .sidebar-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 98;
  }
  .sidebar-overlay.show { opacity: 0.5; pointer-events: all; }

  /* PAGE HEAD */
  main { max-width: 900px; margin: 0 auto; padding: 0 20px; }
  .page-head {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0;
    text-align: left;
  }
  .page-head-title {
    font-family: 'LabelFont', 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .page-head-title i { color: var(--blue); font-size: 0.72em; }
  .page-head-sub { font-size: 12px; color: var(--slate); }

  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 18px;
  }
  .tool-box {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    text-decoration: none; color: var(--dark); text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .tool-box:hover { transform: translateY(-2px); border-color: rgba(37,99,235,0.35); box-shadow: 0 4px 16px rgba(37,99,235,0.15); }
  .tool-box-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #fff;
  }
  .tool-box-label { font-size: 13px; font-weight: 700; }
  .tool-box-desc { font-size: 11px; color: var(--slate); }

  /* ===== BOTTOM NAVIGATION ===== */
  .bottom-navbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 58px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    background: transparent;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(148,163,184,0.12);
    z-index: 999;
  }
  .bottom-navbar a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    color: #A3A3A3;
    font-size: 20px;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .bottom-navbar a.active,
  .bottom-navbar a:hover {
    color: #FFFFFF;
  }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">
    <img src="image/logo.png" alt="Logo" class="nav-brand-logo"/>
    <div class="nav-brand-text">
      <div class="nav-brand-title">RYUICHI STORE</div>
      <div class="nav-brand-sub">#BANYAKDISKONNYA</div>
    </div>
  </div>
  <div class="nav-icons">
    <button class="nav-icon-btn" title="Pesan" onclick="window.location.href='/home/message.html'" style="font-size:25px">
      <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
      </svg>
    </button>
    <button class="nav-icon-btn" title="Menu" onclick="document.getElementById('sidebar').classList.toggle('show'); document.getElementById('sidebar-overlay').classList.toggle('show')">
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </button>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('show'); this.classList.remove('show')"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="image/logo_sidebar.jpg" alt="Logo Sidebar" class="sidebar-logo-img"/>
  </div>

  <div class="sidebar-content">

    <!-- INFORMASI SECTION -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Informasi</div>
      <div class="sidebar-menu">
        <a href="/home/faq.html" class="sidebar-item">
          <i class="fa-solid fa-circle-question"></i>
          <span>FAQ</span>
        </a>
        <a href="/home/layanan.html" class="sidebar-item">
          <i class="fa-solid fa-concierge-bell"></i>
          <span>Layanan</span>
        </a>
        <a href="/home/ketentuan.html" class="sidebar-item">
          <i class="fa-solid fa-file-contract"></i>
          <span>Ketentuan</span>
        </a>
        <a href="/home/tos.html" class="sidebar-item">
          <i class="fa-solid fa-scroll"></i>
          <span>Terms of Service</span>
        </a>
        <a href="/home/kebijakan.html" class="sidebar-item">
          <i class="fa-solid fa-shield-halved"></i>
          <span>Kebijakan</span>
        </a>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- DUKUNGAN SECTION -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Dukungan</div>
      <div class="sidebar-menu">
        <a href="/home/customer-service.html" class="sidebar-item">
          <i class="fa-solid fa-headset"></i>
          <span>Customer Service</span>
        </a>
        <a href="/home/hubungi-kami.html" class="sidebar-item">
          <i class="fa-solid fa-envelope"></i>
          <span>Hubungi Kami</span>
        </a>
        <a href="/home/lapor.html" class="sidebar-item">
          <i class="fa-solid fa-flag"></i>
          <span>Laporkan Bug</span>
        </a>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <button class="sidebar-btn logout" onclick="logout()">
      <i class="fa-solid fa-sign-out-alt"></i> Log Out
    </button>
  </div>
</aside>

<main>
  <div class="page-head">
    <div class="page-head-title">Tools & Utilitas <i class="fa-solid fa-wrench"></i></div>
    <div class="page-head-sub">Pilih tools yang mau kamu pakai</div>
  </div>

  <div class="tools-grid">
    <a class="tool-box" href="/home/downloader.html">
      <div class="tool-box-icon" style="background:linear-gradient(135deg,#2563EB,#1D4ED8);"><i class="fa-solid fa-download"></i></div>
      <div class="tool-box-label">Downloader</div>
      <div class="tool-box-desc">Download video & audio</div>
    </a>
    <a class="tool-box" href="/home/maker.html">
      <div class="tool-box-icon" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9);"><i class="fa-solid fa-palette"></i></div>
      <div class="tool-box-label">Maker</div>
      <div class="tool-box-desc">Buat gambar & konten</div>
    </a>
  </div>
</main>

<script>
function logout() {
  localStorage.removeItem('pg_token');
  localStorage.removeItem('pg_user');
  window.location.href = '/login';
}
</script>

<nav class="bottom-navbar">
  <a href="/dashboard.html" class=""><i class="fa-solid fa-house"></i></a>
  <a href="/home/topup.html" class=""><i class="fa-solid fa-wallet"></i></a>
  <a href="/home/produk.html" class=""><i class="fa-solid fa-box-open"></i></a>
  <a href="/home/history.html" class=""><i class="fa-solid fa-clock-rotate-left"></i></a>
  <a href="/tools.html" class="active"><i class="fa-solid fa-wrench"></i></a>
</nav>
</body>
</html>
