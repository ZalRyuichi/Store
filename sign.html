<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #1E293B;
    --slate:  #94A3B8; --dark:   #F1F5F9; --border: #27272A;
    --white:  #12151C; --red:    #EF4444; --green:  #10B981;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif; background: #000000;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  body::before, body::after {
    content: ''; position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite;
  }
  body::before { width: 400px; height: 400px; background: rgba(37,99,235,0.08); top: -100px; right: -100px; }
  body::after  { width: 300px; height: 300px; background: rgba(16,185,129,0.07); bottom: -80px; left: -80px; animation-delay: -4s; }
  @keyframes float { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

  .card {
    position: relative; z-index: 1; background: var(--white);
    border: 1px solid var(--border); border-radius: 20px;
    width: 100%; max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    animation: slideUp 0.4s cubic-bezier(.16,1,.3,1);
    overflow: hidden;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .banner-outer {
    width: 100%; padding: 20px 20px 0; background: transparent;
  }
  .banner-wrap {
    width: 100%; max-width: 380px; margin: 0 auto;
    background: #0B0F19; overflow: hidden; line-height: 0;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.10), 0 1px 4px rgba(0,0,0,0.08);
    border: 1px solid var(--border);
  }
  .banner-wrap img {
    width: 100%; height: auto; display: block; object-fit: cover;
  }

  .card-body { padding: 30px 36px 36px; }

  .btn-google {
    width: 100%; padding: 11px; background: #fff; color: #1F1F1F;
    border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-google:hover { background: #F8FAFC; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn-google:active { transform: scale(0.98); }

  h1 { font-size: 21px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--slate); margin-bottom: 24px; }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--dark); margin-bottom: 6px; }

  .input-wrap { position: relative; margin-bottom: 16px; }
  .input-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--slate); pointer-events: none; }
  input[type=text], input[type=password] {
    width: 100%; padding: 10px 14px 10px 38px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; background: #1A1D26; color: var(--dark);
  }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: var(--white); }

  .btn {
    width: 100%; padding: 12px; background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: var(--blue-d); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .divider { text-align: center; margin: 16px 0; font-size: 13px; color: var(--slate); position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }


  .notif-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(3,5,10,0.72);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .notif-overlay.show { display: flex; animation: overlayIn .2s ease both; }
  .notif-box {
    width: 100%; max-width: 340px;
    background: rgba(15, 20, 30, 0.9);
    border: 1px solid rgba(96, 165, 250, 0.22);
    border-radius: 20px;
    padding: 32px 26px 26px;
    text-align: center;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardIn .28s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes overlayIn { from { opacity:0; } to { opacity:1; } }
  @keyframes cardIn { from { opacity:0; transform:translateY(14px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes notifIconPop { 0% { transform:scale(0); } 60% { transform:scale(1.15); } 100% { transform:scale(1); } }
  .notif-icon-wrap {
    width: 64px; height: 64px; margin: 0 auto 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    animation: notifIconPop .35s cubic-bezier(.34,1.56,.64,1) .05s both;
  }
  .notif-icon-wrap i { color: inherit; }
  .notif-icon-wrap.success { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.25); color: #34d399; box-shadow: 0 0 24px rgba(52,211,153,.15); }
  .notif-icon-wrap.error   { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25); color: #f87171; box-shadow: 0 0 24px rgba(248,113,113,.15); }
  .notif-icon-wrap.info    { background: rgba(37,99,235,.1); border: 1px solid rgba(37,99,235,.3); color: #60a5fa; box-shadow: 0 0 24px rgba(37,99,235,.15); }
  .notif-icon-wrap.warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: #fbbf24; box-shadow: 0 0 24px rgba(245,158,11,.15); }
  .notif-title {
    font-family: 'Orbitron', 'Inter', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: .6px;
    color: #f8fafc; margin-bottom: 8px;
  }
  .notif-desc {
    font-family: 'Share Tech Mono', 'Inter', monospace; font-size: 12.5px; line-height: 1.6; color: #8ea3c2;
    margin-bottom: 24px; letter-spacing: .2px;
  }
  .notif-btn-ok {
    width: 100%; padding: 13px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #2563eb, #1e40af); color: #fff; font-size: 13.5px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.2s ease, filter 0.2s ease;
    margin-top: 10px;
  }
  .notif-btn-ok:hover { transform: translateY(-2px); filter: brightness(1.08); }
  .notif-btn-ok:active { transform: translateY(0); }
  .notif-btn-ok.error   { background: linear-gradient(135deg, #ef4444, #b91c1c); }
  .notif-btn-ok.success { background: linear-gradient(135deg, #10b981, #047857); }
  .notif-btn-ok.info    { background: linear-gradient(135deg, #2563eb, #1e40af); }
  .notif-btn-ok.warning { background: linear-gradient(135deg, #f59e0b, #b45309); }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .gmodal-box .notif-title { margin-bottom: 4px; }
  .gsi-holder { display: flex; justify-content: center; margin: 18px 0 6px; min-height: 44px; }
  .gsi-hint { font-family: 'Share Tech Mono', 'Inter', monospace; font-size: 11.5px; color: #5b6b85; margin-top: 4px; }
  .gmodal-cancel {
    margin-top: 14px; background: none; border: none; color: #5b6b85; font-size: 12.5px;
    font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: underline;
  }

  .btn-link {
    background: none; border: none; color: var(--slate); font-size: 12.5px;
    font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: underline; margin-top: 10px;
    display: block; text-align: center; width: 100%;
  }
</style>
</head>
<body>

<div class="card">
  <div class="banner-outer">
    <div class="banner-wrap">
      <img src="/image/login.jpg" alt="Login Banner" loading="eager"/>
    </div>
  </div>

  <div class="card-body">
    <h1 id="card-title">Selamat Datang Kembali</h1>
    <p class="subtitle" id="card-subtitle">Masuk Ke Akun Kamu</p>

    <div id="google-email-badge" style="display:none; background:#0f1c33; border:1px solid rgba(96,165,250,.25); color:#93c5fd; font-size:12px; font-family:'Share Tech Mono',monospace; padding:8px 12px; border-radius:10px; margin-bottom:16px;">
      <i class="fa-brands fa-google"></i> <span id="google-email-text"></span>
    </div>

    <label>Username</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" id="username" placeholder="Masukkan username" autocomplete="username"/>
    </div>

    <label>Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
    </div>

    <button class="btn" id="btn-login" onclick="doLogin()">
      <span id="btn-text">Masuk</span>
    </button>
    <button class="btn-link" id="btn-cancel-google-register" style="display:none;" onclick="cancelGoogleRegisterMode()">Batal, Kembali Ke Login</button>

    <div class="divider" id="btn-google-divider">Atau</div>
    <button class="btn-google" id="btn-google" type="button" onclick="startGoogleRegister()">
      <svg viewBox="0 0 48 48" width="18" height="18"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
      Lanjutkan Dengan Google
    </button>
  </div>
</div>

<div class="notif-overlay" id="notif-overlay">
  <div class="notif-box">
    <div class="notif-icon-wrap" id="notif-icon-wrap"><i id="notif-icon-i" class="fa-solid fa-circle-check"></i></div>
    <div class="notif-title" id="notif-title"></div>
    <div class="notif-desc" id="notif-desc"></div>
    <button class="notif-btn-ok" id="notif-btn-ok" onclick="closeNotif()"><i class="fa-solid fa-check"></i> Mengerti</button>
  </div>
</div>

<div class="notif-overlay" id="gmodal-overlay">
  <div class="notif-box gmodal-box">
    <div class="notif-icon-wrap info"><i class="fa-brands fa-google"></i></div>
    <div class="notif-title" id="gmodal-title">Pilih Akun Google</div>
    <div class="notif-desc" id="gmodal-desc">Pilih Akun Google Untuk Melanjutkan.</div>
    <div class="gsi-holder" id="gsi-holder"></div>
    <div class="gsi-hint">Jika Tidak Muncul, Klik Tombol Google Di Atas.</div>
    <button class="gmodal-cancel" onclick="closeGoogleModal()">Batal</button>
  </div>
</div>

<script>
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  try {
    const cached = localStorage.getItem("pg_api_base");
    if (cached) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) { API_BASE = u; localStorage.setItem("pg_api_base", u); }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }
</script>
<script>
  const GOOGLE_CLIENT_ID = "156829624887-o5136fanml8smi5r10ojqimrib1h520p.apps.googleusercontent.com";

  if (localStorage.getItem('pg_token')) window.location.href = '/dashboard';

  let _notifCallback = null;

  function showNotif(msg, type = 'error', sub = '') {
    const icons = {
      error:   'fa-solid fa-circle-exclamation',
      success: 'fa-solid fa-circle-check',
      info:    'fa-solid fa-circle-info',
      warning: 'fa-solid fa-triangle-exclamation'
    };
    const iconEl = document.getElementById('notif-icon-i');
    iconEl.className = icons[type] || icons.info;
    document.getElementById('notif-icon-wrap').className = `notif-icon-wrap ${type}`;
    document.getElementById('notif-title').textContent = msg;
    document.getElementById('notif-desc').textContent = sub;
    document.getElementById('notif-btn-ok').className = `notif-btn-ok ${type}`;
    document.getElementById('notif-overlay').classList.add('show');
  }

  function closeNotif() {
    document.getElementById('notif-overlay').classList.remove('show');
    if (_notifCallback) { _notifCallback(); _notifCallback = null; }
  }

  document.getElementById('notif-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeNotif();
  });

  document.getElementById('gmodal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeGoogleModal();
  });

  function setLoading(v) {
    const btn = document.getElementById('btn-login');
    btn.disabled = v;
    document.getElementById('btn-text').textContent = v ? '' : 'Masuk';
    if (v) { const s = document.createElement('div'); s.className = 'spinner'; btn.appendChild(s); }
    else btn.querySelector('.spinner')?.remove();
  }

  function goToDashboard(data, username) {
    localStorage.setItem('pg_token', data.token);
    localStorage.setItem('pg_user', data.username || username);
    _notifCallback = () => window.location.href = '/dashboard';
    showNotif('Login Berhasil!', 'success', 'Mengalihkan Ke Dashboard...');
    setTimeout(() => window.location.href = '/dashboard', 1200);
  }

  // ---------- Mode Utama: Login Biasa ----------
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showNotif('Username Dan Password Wajib Diisi', 'error', 'Pastikan Kedua Data Sudah Terisi.'); return; }
    setLoading(true);
    await loadApiBase();
    try {
      const res = await fetch(apiUrl('/api/login'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!data.ok) {
        showNotif(data.message || 'Login Gagal', 'error', 'Periksa Username Dan Password Anda.');
        setLoading(false);
        return;
      }

      if (data.needs_google) {
        // Akun ini belum terhubung Google, minta pilih akun dulu lalu auto-link
        setLoading(false);
        showNotif('Akun Belum Terhubung Google', 'info', 'Silakan Pilih Akun Google Untuk Melanjutkan.');
        _notifCallback = () => openGoogleModal('link', { username, password });
        return;
      }

      goToDashboard(data, username);
    } catch {
      showNotif('Tidak Dapat Terhubung Ke Server', 'error', 'Periksa Koneksi Internet Anda.');
      setLoading(false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter' && !isGoogleRegisterMode) doLogin(); });

  // ---------- Google Identity Services ----------
  let googleInitialized = false;
  let googleModalMode = null;    // 'register' | 'link'
  let googleLinkCreds = null;    // { username, password } saat mode 'link'
  let isGoogleRegisterMode = false;

  function initGoogleIdentity() {
    if (googleInitialized || !window.google?.accounts?.id) return;
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: onGoogleCredential,
      auto_select: false,
      cancel_on_tap_outside: false,
    });
    googleInitialized = true;
  }

  function openGoogleModal(mode, linkCreds = null) {
    googleModalMode = mode;
    googleLinkCreds = linkCreds;
    initGoogleIdentity();

    const titleEl = document.getElementById('gmodal-title');
    const descEl  = document.getElementById('gmodal-desc');
    if (mode === 'register') {
      titleEl.textContent = 'Pilih Akun Google';
      descEl.textContent  = 'Pilih Akun Google Untuk Membuat Akun Baru.';
    } else {
      titleEl.textContent = 'Hubungkan Akun Google';
      descEl.textContent  = 'Akun Kamu Belum Terhubung Google, Pilih Akun Untuk Melanjutkan Login.';
    }

    document.getElementById('gmodal-overlay').classList.add('show');

    const holder = document.getElementById('gsi-holder');
    holder.innerHTML = '';

    if (window.google?.accounts?.id) {
      google.accounts.id.renderButton(holder, {
        theme: 'filled_black', size: 'large', type: 'standard',
        text: 'continue_with', shape: 'pill', width: 280,
      });
      google.accounts.id.prompt();
    } else {
      descEl.textContent = 'Google Belum Siap, Coba Muat Ulang Halaman.';
    }
  }

  function closeGoogleModal() {
    document.getElementById('gmodal-overlay').classList.remove('show');
    googleModalMode = null;
    googleLinkCreds = null;
  }

  async function onGoogleCredential(response) {
    const credential = response.credential;
    const mode = googleModalMode;
    const linkCreds = googleLinkCreds; // simpan dulu sebelum closeGoogleModal() me-reset variabelnya
    closeGoogleModal();
    if (!credential) return;

    if (mode === 'register') {
      enterGoogleRegisterMode(credential);
    } else if (mode === 'link') {
      await finishGoogleLink(credential, linkCreds);
    }
  }

  // ---------- Mode Daftar Akun Baru Via Google ----------
  function startGoogleRegister() {
    openGoogleModal('register');
  }

  function enterGoogleRegisterMode(credential) {
    isGoogleRegisterMode = true;
    window._pendingGoogleCredential = credential;

    document.getElementById('card-title').textContent = 'Buat Akun Baru';
    document.getElementById('card-subtitle').textContent = 'Lengkapi Username Dan Password Untuk Akun Kamu';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('username').focus();

    document.getElementById('btn-text').textContent = 'Buat Akun & Login';
    document.getElementById('btn-login').onclick = doRegisterWithGoogle;

    document.getElementById('btn-google').style.display = 'none';
    document.getElementById('btn-google-divider').style.display = 'none';
    document.getElementById('btn-cancel-google-register').style.display = 'block';

    showNotif('Akun Google Terpilih', 'success', 'Sekarang Isi Username Dan Password Untuk Menyelesaikan Pendaftaran.');
  }

  function cancelGoogleRegisterMode() {
    isGoogleRegisterMode = false;
    window._pendingGoogleCredential = null;

    document.getElementById('card-title').textContent = 'Selamat Datang Kembali';
    document.getElementById('card-subtitle').textContent = 'Masuk Ke Akun Kamu';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';

    document.getElementById('btn-text').textContent = 'Masuk';
    document.getElementById('btn-login').onclick = doLogin;

    document.getElementById('btn-google').style.display = 'flex';
    document.getElementById('btn-google-divider').style.display = 'block';
    document.getElementById('btn-cancel-google-register').style.display = 'none';
  }

  async function doRegisterWithGoogle() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const credential = window._pendingGoogleCredential;

    if (!username || !password) { showNotif('Username Dan Password Wajib Diisi', 'error', 'Pastikan Kedua Data Sudah Terisi.'); return; }
    if (!credential) { showNotif('Sesi Google Habis', 'error', 'Silakan Ulangi Pilih Akun Google.'); cancelGoogleRegisterMode(); return; }

    setLoading(true);
    await loadApiBase();
    try {
      const res = await fetch(apiUrl('/api/auth/google/register'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, credential })
      });
      const data = await res.json();
      if (data.ok) {
        goToDashboard(data, username);
      } else {
        showNotif(data.message || 'Gagal Membuat Akun', 'error', 'Periksa Kembali Data Kamu.');
        setLoading(false);
      }
    } catch {
      showNotif('Tidak Dapat Terhubung Ke Server', 'error', 'Periksa Koneksi Internet Anda.');
      setLoading(false);
    }
  }

  // ---------- Mode Link Google Saat Login ----------
  async function finishGoogleLink(credential, creds) {
    if (!creds) return;
    setLoading(true);
    await loadApiBase();
    try {
      const res = await fetch(apiUrl('/api/auth/google/link'), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: creds.username, password: creds.password, credential })
      });
      const data = await res.json();
      if (data.ok) {
        goToDashboard(data, creds.username);
      } else {
        showNotif(data.message || 'Gagal Menghubungkan Akun Google', 'error', 'Silakan Coba Lagi.');
        setLoading(false);
      }
    } catch {
      showNotif('Tidak Dapat Terhubung Ke Server', 'error', 'Periksa Koneksi Internet Anda.');
      setLoading(false);
    }
  }
</script>
