<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:   #2563EB; --blue-d: #1D4ED8; --blue-l: #EFF6FF;
    --slate:  #64748B; --dark:   #0F172A; --border: #E2E8F0;
    --white:  #FFFFFF; --red:    #EF4444; --green:  #10B981;
    --radius: 12px;
  }
  body {
    font-family: 'Inter', sans-serif; background: #F8FAFC;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  body::before, body::after {
    content: ''; position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite;
  }
  body::before { width: 400px; height: 400px; background: rgba(37,99,235,0.08); top: -100px; right: -100px; }
  body::after  { width: 300px; height: 300px; background: rgba(16,185,129,0.07); bottom: -80px; left: -80px; animation-delay: -4s; }
  @keyframes float { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

  .card {
    position: relative; z-index: 1;
    background: var(--white); border: 1px solid var(--border);
    border-radius: 20px; width: 100%; max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    animation: slideUp 0.4s cubic-bezier(.16,1,.3,1);
    overflow: hidden;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .banner-outer {
    width: 100%; padding: 20px 20px 0; background: transparent;
  }
  .banner-wrap {
    width: 100%; max-width: 380px; margin: 0 auto;
    background: var(--dark); overflow: hidden; line-height: 0;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.10), 0 1px 4px rgba(0,0,0,0.08);
    border: 1px solid var(--border);
  }
  .banner-wrap img {
    width: 100%; height: auto; display: block; object-fit: cover;
  }

  .card-body { padding: 30px 36px 36px; }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; text-decoration: none; }
  .logo-icon { width: 38px; height: 38px; background: var(--blue); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 20px; height: 20px; }
  .logo-text { font-size: 18px; font-weight: 800; color: var(--dark); }
  .logo-text span { color: var(--blue); }

  h1 { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--slate); margin-bottom: 24px; }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--dark); margin-bottom: 6px; }

  .input-wrap { position: relative; margin-bottom: 14px; }
  .input-wrap svg {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; color: var(--slate); pointer-events: none;
  }
  input[type=text], input[type=password], input[type=email] {
    width: 100%; padding: 10px 14px 10px 38px;
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; background: #FAFAFA; color: var(--dark);
  }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: var(--white); }

  .password-strength { margin-top: 5px; height: 3px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .strength-bar { height: 100%; width: 0; border-radius: 3px; transition: width 0.3s, background 0.3s; }

  .btn {
    width: 100%; padding: 12px; background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s; margin-top: 6px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: var(--blue-d); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .divider { text-align: center; margin: 16px 0; font-size: 13px; color: var(--slate); position: relative; }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border);
  }
  .divider::before { left: 0; } .divider::after { right: 0; }

  .link-login { display: block; text-align: center; font-size: 13px; color: var(--slate); }
  .link-login a { color: var(--blue); font-weight: 600; text-decoration: none; }
  .link-login a:hover { text-decoration: underline; }

  .notif-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.45);
    display: none; align-items: center; justify-content: center; z-index: 9999;
    backdrop-filter: blur(4px); padding: 20px;
  }
  .notif-overlay.show { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from { opacity:0; } to { opacity:1; } }
  .notif-box {
    background: var(--white); border-radius: 18px; padding: 32px 36px 28px;
    width: 100%; max-width: 420px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: notifUp 0.3s cubic-bezier(.16,1,.3,1);
  }
  @keyframes notifUp { from { opacity:0; transform:translateY(20px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
  .notif-icon {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 20px;
  }
  .notif-icon.error   { background: #FEF2F2; color: var(--red); }
  .notif-icon.success { background: #F0FDF4; color: var(--green); }
  .notif-icon.info    { background: var(--blue-l); color: var(--blue); }
  .notif-msg {
    font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.4;
  }
  .notif-msg.error   { color: #991B1B; }
  .notif-msg.success { color: #166534; }
  .notif-msg.info    { color: var(--blue-d); }
  .notif-sub { font-size: 13px; color: var(--slate); margin-bottom: 24px; }
  .notif-ok {
    padding: 11px 40px; background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
    min-width: 120px;
  }
  .notif-ok:hover { background: var(--blue-d); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
  .notif-ok.error   { background: var(--red); }
  .notif-ok.error:hover { background: #DC2626; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
  .notif-ok.success { background: var(--green); }
  .notif-ok.success:hover { background: #059669; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="banner-outer">
    <div class="banner-wrap">
      <img src="/image/welcome.jpg" alt="Zal Яyuichi Banner" loading="eager"/>
    </div>
  </div>

  <div class="card-body">
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div class="logo-text">Zal <span>Яyuichi</span></div>
    </a>

    <h1>Buat akun baru</h1>
    <p class="subtitle">Masukkan Username Dan Password Untuk Daftar</p>

    <label>Username</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <input type="text" id="username" placeholder="Pilih username unik"/>
    </div>

    <label>Password <span style="font-size:11px;color:var(--slate);font-weight:400">(1–3 karakter)</span></label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="1–3 karakter" maxlength="3"/>
    </div>

    <button class="btn" id="btn-reg" onclick="doRegister()">
      <span id="btn-text">Buat Akun</span>
    </button>

    <div class="divider">Atau</div>
    <div class="link-login">Sudah Punya Akun? <a href="/login">Masuk Sekarang</a></div>
  </div>
</div>

<div class="notif-overlay" id="notif-overlay">
  <div class="notif-box">
    <div class="notif-icon" id="notif-icon"><i id="notif-icon-i" class="fa-solid fa-circle-xmark"></i></div>
    <div class="notif-msg" id="notif-msg"></div>
    <div class="notif-sub" id="notif-sub"></div>
    <button class="notif-ok" id="notif-ok" onclick="closeNotif()">OK</button>
  </div>
</div>

<script>
const API_TXT_URL = "https://raw.githubusercontent.com/ZalRyuichi/Store/main/api.txt";
let API_BASE = "";
async function loadApiBase() {
  try {
    const cached = localStorage.getItem("pg_api_base");
    if (cached) API_BASE = cached.trim();
    const r = await fetch(API_TXT_URL + "?t=" + Date.now());
    if (r.ok) {
      const u = (await r.text()).trim();
      if (u && u.startsWith("http")) { API_BASE = u; localStorage.setItem("pg_api_base", u); }
    }
  } catch { const c = localStorage.getItem("pg_api_base"); if (c) API_BASE = c.trim(); }
}
function apiUrl(p) { return API_BASE ? `${API_BASE}${p}` : p; }
</script>
<script>
  if (localStorage.getItem('pg_token')) window.location.href = '/dashboard';

  let _notifCallback = null;

  function showNotif(msg, type = 'error', sub = '') {
    const icons = {
      error:   'fa-solid fa-circle-xmark',
      success: 'fa-solid fa-circle-check',
      info:    'fa-solid fa-circle-info'
    };
    document.getElementById('notif-icon-i').className = icons[type] || icons.info;
    document.getElementById('notif-icon').className = `notif-icon ${type}`;
    document.getElementById('notif-msg').textContent = msg;
    document.getElementById('notif-msg').className = `notif-msg ${type}`;
    document.getElementById('notif-sub').textContent = sub;
    document.getElementById('notif-ok').className = `notif-ok ${type}`;
    document.getElementById('notif-overlay').classList.add('show');
  }

  function closeNotif() {
    document.getElementById('notif-overlay').classList.remove('show');
    if (_notifCallback) { _notifCallback(); _notifCallback = null; }
  }

  function setLoading(v) {
    const btn = document.getElementById('btn-reg');
    btn.disabled = v;
    document.getElementById('btn-text').textContent = v ? '' : 'Buat Akun';
    if (v) { const s = document.createElement('div'); s.className = 'spinner'; btn.appendChild(s); }
    else btn.querySelector('.spinner')?.remove();
  }

  async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) { showNotif('Semua field wajib diisi', 'error', 'Pastikan username dan password sudah terisi.'); return; }
    if (password.length < 1 || password.length > 3) { showNotif('Password Tidak Valid', 'error', 'Password Harus 1–3 Karakter.'); return; }

    setLoading(true);
    await loadApiBase();
    try {
      const res = await fetch(apiUrl('/api/register'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.ok) {
        _notifCallback = () => window.location.href = '/login';
        showNotif('Akun Berhasil Dibuat!', 'success', 'Kamu Akan Diarahkan Ke Halaman Login.');
        setTimeout(() => window.location.href = '/login', 1500);
      } else {
        showNotif(data.message || 'Registrasi Gagal', 'error', 'Coba Gunakan Username Yang Berbeda.');
        setLoading(false);
      }
    } catch {
      showNotif('Tidak Dapat Terhubung Ke Server', 'error', 'Periksa Koneksi Internet Anda.');
      setLoading(false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
